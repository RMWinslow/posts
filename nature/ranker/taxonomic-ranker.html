<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taxonomic Ranker</title>
  <meta name="description" content="A drag-and-drop prototype for ranking taxonomic clades.">
  <meta property="og:title" content="Taxonomic Ranker">
  <meta property="og:description" content="A drag-and-drop prototype for ranking taxonomic clades.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://blog.rmwinslow.com/nature/ranker/taxonomic-ranker-og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://blog.rmwinslow.com/nature/ranker/taxonomic-ranker-og.png">
  <style>
    :root {
      color-scheme: light;
      --paper: #06839a;
      --panel: #c7d9ef;
      --ink: #07162e;
      --muted: #33435f;
      --green: #13885a;
      --blue: #005bc8;
      --gold: #f2bf2c;
      --red: #b02b64;
      --tier-s-bg: #e98bad;
      --tier-a-bg: #e8b46f;
      --tier-b-bg: #ded96f;
      --tier-c-bg: #91cfa5;
      --tier-d-bg: #86c5dd;
      --tier-f-bg: #aaa0da;
      --shadow: 3px 3px 0 rgba(0, 33, 78, 0.34);
      --taxon-card-width: 164px;
      --taxon-card-height: 128px;
      --tray-width: 357px;
      --win-face: #d4e4f7;
      --win-border-light: #ffffff;
      font-family: Tahoma, Verdana, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.13) 0 1px, transparent 1px 9px),
        linear-gradient(135deg, #004b94 0%, #0796b0 46%, #3dc8d8 100%),
        var(--paper);
      color: var(--ink);
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 2px outset var(--win-border-light);
      border-radius: 0;
      background: linear-gradient(#ffffff 0%, #d9ecff 42%, #98bde7 43%, #c6dcf5 100%);
      color: var(--ink);
      min-height: 30px;
      padding: 0 10px;
      cursor: pointer;
    }

    button:hover {
      background: linear-gradient(#ffffff 0%, #eaf8ff 42%, #7ccde6 43%, #c9f2ff 100%);
    }

    button:active {
      border-style: inset;
      background: linear-gradient(#83a9d8, #d6e8fb);
    }

    button.primary {
      border-color: var(--win-border-light);
      background: linear-gradient(#70e4aa 0%, var(--green) 50%, #83f0bd 100%);
      color: #ffffff;
    }

    button.danger {
      color: var(--red);
    }

    button:focus-visible,
    textarea:focus-visible,
    .taxon-card:focus-visible {
      outline: 3px solid rgba(49, 95, 159, 0.34);
      outline-offset: 1px;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      border-bottom: 3px ridge var(--win-border-light);
      background: linear-gradient(#dffcff 0%, #6ad4f2 38%, #006ad4 39%, #003f9f 100%);
      color: #ffffff;
    }

    .topbar {
      width: min(1440px, calc(100vw - 32px));
      margin: 0 auto;
      min-height: 60px;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .brand {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 2vw, 1.8rem);
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 1px 1px 0 #001f66;
    }

    .subline {
      margin-top: 4px;
      color: #e6fbff;
      font-size: 0.84rem;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 4px #ffffff;
      display: inline-block;
    }

    .tabs {
      display: flex;
      gap: 4px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .tabs button[aria-pressed="true"] {
      border-style: inset;
      background: linear-gradient(#002968, #0066d8);
      border-color: var(--win-border-light);
      color: #ffffff;
    }

    main {
      width: min(1440px, calc(100vw - 32px));
      margin: 12px auto 10px;
      display: grid;
      gap: 10px;
    }

    .attribution {
      width: min(1440px, calc(100vw - 32px));
      margin: 0 auto 18px;
      padding: 6px 10px;
      border: 2px inset var(--win-border-light);
      background: rgba(212, 228, 247, 0.82);
      color: #15345c;
      font-size: 0.78rem;
      line-height: 1.3;
      text-align: center;
      text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.75);
    }

    .attribution a {
      color: var(--blue);
      font-weight: 700;
    }

    .board,
    .panel {
      background: var(--panel);
      border: 3px outset var(--win-border-light);
      border-radius: 0;
      box-shadow: var(--shadow);
    }

    .board {
      min-width: 0;
      overflow: hidden;
    }

    .board-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 10px;
      border-bottom: 3px ridge var(--win-border-light);
      background: linear-gradient(90deg, #eaf8ff 0%, #b9d9f6 48%, #8fc5ef 100%);
    }

    .context h2 {
      margin: 0;
      font-size: clamp(1.25rem, 1.8vw, 1.65rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .context p {
      margin: 4px 0 0;
      color: var(--muted);
      line-height: 1.25;
    }

    .context-path {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 4px;
    }

    .context-path button {
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--blue);
      line-height: inherit;
      text-decoration: underline;
    }

    .context-path button:hover {
      background: transparent;
      text-decoration: underline;
    }

    .path-separator,
    .context-count {
      color: var(--muted);
    }

    .context-count {
      margin-left: 4px;
    }

    .commands {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .workspace {
      display: grid;
      grid-template-columns: var(--tray-width) minmax(0, 1fr);
      min-height: 0;
    }

    .tray {
      border-right: 3px ridge var(--win-border-light);
      background: #bdd9e9;
      padding: 8px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
      min-height: 0;
      min-width: 0;
    }

    .tray-head,
    .tier-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      padding: 0 2px;
    }

    .tray-title,
    .tier-title {
      font-weight: 820;
      color: #052244;
      text-shadow: 1px 1px 0 #ffffff;
    }

    .list-count {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .dropzone {
      min-height: 112px;
      border: 0;
      border-radius: 0;
      padding: 2px;
      display: grid;
      grid-template-columns: repeat(auto-fill, var(--taxon-card-width));
      align-content: start;
      align-items: start;
      justify-content: start;
      gap: 2px;
    }

    .dropzone.empty.drag-over::after {
      content: none;
    }

    .dropzone.insert-empty::before {
      content: "";
      width: 6px;
      height: var(--taxon-card-height);
      background: var(--blue);
      pointer-events: none;
    }

    .dropzone.empty::after {
      content: attr(data-empty);
      color: #768179;
      font-size: 0.84rem;
      padding: 8px;
    }

    .tier-panel {
      min-width: 0;
      padding: 8px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
      background: #cbd9f2;
    }

    .tier-list {
      display: grid;
      gap: 5px;
      align-content: start;
    }

    .tier-row {
      --tier-bg: #9fc6dc;
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr);
      min-height: 52px;
      border: 2px inset var(--win-border-light);
      background: transparent;
    }

    .tier-row[data-tier="s"] { --tier-bg: var(--tier-s-bg); }
    .tier-row[data-tier="a"] { --tier-bg: var(--tier-a-bg); }
    .tier-row[data-tier="b"] { --tier-bg: var(--tier-b-bg); }
    .tier-row[data-tier="c"] { --tier-bg: var(--tier-c-bg); }
    .tier-row[data-tier="d"] { --tier-bg: var(--tier-d-bg); }
    .tier-row[data-tier="f"] { --tier-bg: var(--tier-f-bg); }

    .tier-label {
      display: grid;
      place-items: center;
      min-width: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0) 46%),
        var(--tier-bg);
      color: #061a38;
      font-size: 2rem;
      font-weight: 900;
      text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.62);
    }

    .tier-dropzone {
      min-height: 48px;
      background: #d8e6f9;
    }

    .tray .dropzone {
      border: 2px inset var(--win-border-light);
      grid-template-columns: repeat(2, var(--taxon-card-width));
      min-height: 0;
      height: 100%;
      overflow-y: auto;
    }

    .taxon-card {
      width: var(--taxon-card-width);
      height: var(--taxon-card-height);
      border: 2px outset var(--win-border-light);
      border-radius: 0;
      background: var(--win-face);
      min-width: 0;
      overflow: hidden;
      box-shadow: none;
      cursor: grab;
      display: block;
      position: relative;
    }

    .taxon-card.dragging {
      opacity: 0.55;
      cursor: grabbing;
      border-style: inset;
    }

    .taxon-card.insert-before,
    .taxon-card.insert-after {
      overflow: visible;
      z-index: 5;
    }

    .taxon-card.insert-before::before,
    .taxon-card.insert-after::after {
      content: "";
      position: absolute;
      top: -5px;
      bottom: -5px;
      width: 6px;
      z-index: 6;
      background: var(--blue);
      pointer-events: none;
    }

    .taxon-card.insert-before::before {
      left: -6px;
    }

    .taxon-card.insert-after::after {
      right: -6px;
    }

    .media {
      position: relative;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #9bdbe9 0%, #c3d2f7 52%, #ffe06b 100%);
    }

    .media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    .media .fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 2.1rem;
      font-weight: 840;
      color: rgba(23, 32, 38, 0.72);
      z-index: 0;
    }

    .media img:not([src]),
    .media img.failed {
      display: none;
    }

    .card-body {
      min-width: 0;
      position: absolute;
      left: 5px;
      right: 5px;
      bottom: 5px;
      z-index: 2;
      padding: 5px 6px;
      display: grid;
      gap: 3px;
      align-content: start;
      overflow: hidden;
      border: 4px ridge rgba(238, 238, 238, 0.82);
      background: linear-gradient(rgba(0, 53, 117, 0.82), rgba(3, 20, 54, 0.82));
      color: #ffffff;
      text-shadow: 1px 1px 0 #000000;
    }

    .names {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .common {
      display: block;
      font-weight: 760;
      font-size: 0.8rem;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .scientific {
      display: block;
      color: #eeeeee;
      font-size: 0.76rem;
      font-style: italic;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-tool {
      position: absolute;
      top: 4px;
      z-index: 2;
      width: 26px;
      height: 26px;
      min-height: 26px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 2px outset var(--win-border-light);
      border-radius: 0;
      background: linear-gradient(#ffffff 0%, #d4eeff 48%, #92b7e4 49%, #d3e9ff 100%);
      color: #111111;
    }

    .card-tool:hover {
      background: linear-gradient(#ffffff 0%, #e5f6ff 48%, #a6caff 49%, #eaf7ff 100%);
    }

    .card-tool:active {
      border-style: inset;
    }

    .open-child {
      right: 4px;
    }

    .taxon-info {
      left: 4px;
      box-sizing: border-box;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.12rem;
      font-style: italic;
      font-weight: 900;
      line-height: 1;
      text-decoration: none;
      text-shadow: 1px 1px 0 #ffffff;
    }

    .magnify-icon {
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-radius: 50%;
      display: block;
      position: relative;
    }

    .magnify-icon::after {
      content: "";
      width: 7px;
      height: 2px;
      background: currentColor;
      position: absolute;
      right: -6px;
      bottom: -3px;
      transform: rotate(45deg);
      transform-origin: center;
    }

    .panel {
      padding: 10px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 1.35rem;
    }

    .results-list {
      display: grid;
      gap: 8px;
    }

    .result-group {
      border: 3px inset var(--win-border-light);
      border-radius: 0;
      background: #e5f4ff;
      padding: 8px;
    }

    .result-group h3 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .result-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 4px 0;
      color: var(--muted);
      line-height: 1.3;
    }

    .result-line strong {
      color: var(--ink);
      min-width: 30px;
    }

    textarea {
      width: 100%;
      min-height: 360px;
      resize: vertical;
      border: 3px inset var(--win-border-light);
      border-radius: 0;
      padding: 8px;
      background: #f3fbff;
      color: var(--ink);
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .data-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(420px, calc(100vw - 36px));
      padding: 8px 10px;
      border: 3px outset var(--win-border-light);
      border-radius: 0;
      background: linear-gradient(#006ad4, #003f9f);
      color: #ffffff;
      box-shadow: var(--shadow);
      transform: translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 50;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 1040px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .tray {
        border-right: 0;
        border-bottom: 3px ridge var(--win-border-light);
      }

      .tray .dropzone {
        min-height: 112px;
        height: auto;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        width: min(100vw - 20px, 1440px);
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 8px 0;
      }

      main {
        width: min(100vw - 20px, 1440px);
        margin-top: 12px;
      }

      .tabs,
      .commands {
        justify-content: flex-start;
      }

      .board-head {
        grid-template-columns: 1fr;
      }

      .tier-dropzone {
        grid-template-columns: repeat(auto-fill, var(--taxon-card-width));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topbar">
        <div class="brand">
          <h1>Taxonomic Ranker</h1>
          <div class="subline">
            <span id="rank-subline">Top-down clade sorting</span>
            <span class="dot" aria-hidden="true"></span>
            <span id="save-status">Checking local saves</span>
          </div>
        </div>
        <nav class="tabs" aria-label="Views">
          <button type="button" data-view-button="rank" aria-pressed="true">Rank</button>
          <button type="button" data-view-button="results" aria-pressed="false">Results</button>
          <button type="button" data-view-button="data" aria-pressed="false">Data</button>
        </nav>
      </div>
    </header>

    <main>
      <section id="rank-view" aria-label="Rank workspace">
        <section class="board">
          <div class="board-head">
            <div class="context">
              <h2 id="context-title">Life</h2>
              <p id="context-summary"></p>
            </div>
            <div class="commands">
              <button type="button" id="back-button">Back</button>
              <button type="button" id="place-leftovers-button">Send leftovers to F</button>
              <button type="button" id="clear-group-button" class="danger">Clear group</button>
            </div>
          </div>

          <div class="workspace">
            <section class="tray" aria-label="Unranked taxa">
              <div class="tray-head">
                <span class="tray-title">Unranked</span>
                <span id="tray-count" class="list-count">0</span>
              </div>
              <div id="unranked-list" class="dropzone" data-list="unranked" data-empty="No unranked cards"></div>
            </section>

            <section class="tier-panel" aria-label="Tier list">
              <div class="tier-head">
                <span class="tier-title">Tier list</span>
                <span id="tier-count" class="list-count">0 placed</span>
              </div>
              <div id="tier-list" class="tier-list"></div>
            </section>
          </div>
        </section>
      </section>

      <section id="results-view" class="panel" hidden>
        <h2>Results</h2>
        <div id="results-list" class="results-list"></div>
      </section>

      <section id="data-view" class="panel" hidden>
        <h2>Data</h2>
        <div class="data-actions">
          <button type="button" id="refresh-export-button" class="primary">Refresh export</button>
          <button type="button" id="copy-export-button">Copy</button>
          <button type="button" id="import-button">Import</button>
          <button type="button" id="reset-all-button" class="danger">Reset all</button>
        </div>
        <textarea id="data-box" spellcheck="false"></textarea>
      </section>
    </main>

    <footer class="attribution">
      Coded with help from ChatGPT 5.5, Photos and Taxonomy from
      <a href="https://www.inaturalist.org/" target="_blank" rel="noopener noreferrer">iNaturalist</a>,
      Inspired by
      <a href="https://goblinodds.com/phylofeeler#life" target="_blank" rel="noopener noreferrer">Phylofeeler</a>
      by <a href="https://x.com/goblinodds" target="_blank" rel="noopener noreferrer">@goblinodds</a>.
    </footer>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const ROOT_TAXON_ID = "48460";
    const STORAGE_KEY = "rmw-taxonomic-ranker-v2";
    const IMAGE_CACHE_KEY = `${STORAGE_KEY}:inat-images-v5`;
    const INATURALIST_TAXA_INDEX_URL = "https://api.inaturalist.org/v1/taxa";
    const INATURALIST_TAXA_AUTOCOMPLETE_URL = "https://api.inaturalist.org/v1/taxa/autocomplete";
    const INATURALIST_OBSERVATIONS_URL = "https://api.inaturalist.org/v1/observations";
    const INATURALIST_TAXON_SEARCH_URL = "https://www.inaturalist.org/taxa/search";
    const INATURALIST_TAXON_PAGE_URL = "https://www.inaturalist.org/taxa";
    const INATURALIST_REQUEST_LIMIT = 60;
    const INATURALIST_REQUEST_WINDOW_MS = 60 * 1000;
    const URL_PARAMS = new URLSearchParams(globalThis.location?.search || "");
    const SMOKE_MODE = URL_PARAMS.has("smoke");
    const AUTO_LOAD_TAXA = !SMOKE_MODE && !URL_PARAMS.has("noautoload");
    const TIER_ORDER = ["s", "a", "b", "c", "d", "f"];
    const TIER_LABELS = {
      s: "S",
      a: "A",
      b: "B",
      c: "C",
      d: "D",
      f: "F"
    };

    const TAXONOMY = {
      id: ROOT_TAXON_ID,
      name: "Life",
      scientific: "Life",
      rank: "stateofmatter",
      children: [],
      childrenLoaded: false,
      childrenLoading: false,
      childrenError: "",
      childrenTotal: 0,
      childrenChecked: false,
      detailsLoaded: true,
      ancestorIds: [],
      inaturalistUrl: `${INATURALIST_TAXON_PAGE_URL}/${ROOT_TAXON_ID}`
    };
    const nodes = new Map();
    const parents = new Map();
    const childRequests = new Map();
    const childPresenceRequests = new Map();
    const taxonDetailRequests = new Map();
    const imageCache = new Map(loadImageCache());
    const imageRequests = new Map();
    const imageRequestTimes = [];
    let inaturalistPausedUntil = 0;
    let activeView = "rank";
    let draggedId = "";
    let appliedHashId = "";
    let toastTimer = 0;

    registerTaxon(TAXONOMY, null);
    let state = loadState();

    const els = {
      rankSubline: document.querySelector("#rank-subline"),
      saveStatus: document.querySelector("#save-status"),
      rankView: document.querySelector("#rank-view"),
      resultsView: document.querySelector("#results-view"),
      dataView: document.querySelector("#data-view"),
      contextTitle: document.querySelector("#context-title"),
      contextSummary: document.querySelector("#context-summary"),
      backButton: document.querySelector("#back-button"),
      placeLeftoversButton: document.querySelector("#place-leftovers-button"),
      clearGroupButton: document.querySelector("#clear-group-button"),
      unrankedList: document.querySelector("#unranked-list"),
      trayCount: document.querySelector("#tray-count"),
      tierList: document.querySelector("#tier-list"),
      tierCount: document.querySelector("#tier-count"),
      resultsList: document.querySelector("#results-list"),
      dataBox: document.querySelector("#data-box"),
      toast: document.querySelector("#toast")
    };

    document.addEventListener("click", onClick);
    document.addEventListener("dragstart", onDragStart);
    document.addEventListener("dragend", onDragEnd);
    document.addEventListener("dragover", onDragOver);
    document.addEventListener("dragleave", onDragLeave);
    document.addEventListener("drop", onDrop);
    globalThis.addEventListener?.("hashchange", routeFromHash);
    globalThis.addEventListener?.("popstate", routeFromHash);
    globalThis.setInterval?.(routeFromHash, 500);

    verifyStorage();
    initializeRoute();
    maybeRunBuiltInSmoke();

    function registerTaxon(node, parentId) {
      node.id = String(node.id);
      node.children = Array.isArray(node.children) ? node.children : [];
      const existing = nodes.get(node.id);
      if (existing && existing !== node) {
        const existingState = {
          children: existing.children,
          childrenLoaded: existing.childrenLoaded,
          childrenLoading: existing.childrenLoading,
          childrenError: existing.childrenError,
          childrenTotal: existing.childrenTotal,
          childrenChecked: existing.childrenChecked,
          detailsLoaded: existing.detailsLoaded
        };
        Object.assign(existing, node);
        if (!node.children.length) {
          existing.children = existingState.children;
          existing.childrenLoaded = existingState.childrenLoaded;
          existing.childrenLoading = existingState.childrenLoading;
          existing.childrenError = existingState.childrenError;
          existing.childrenTotal = existingState.childrenTotal;
        }
        existing.childrenChecked = Boolean(existing.childrenChecked || existingState.childrenChecked);
        existing.detailsLoaded = Boolean(existing.detailsLoaded || existingState.detailsLoaded);
        node = existing;
      } else {
        nodes.set(node.id, node);
      }
      if (parentId) parents.set(node.id, parentId);
      node.children.forEach((child) => registerTaxon(child, node.id));
      return node;
    }

    function initializeRoute() {
      const hashId = hashTaxonId();
      if (hashId) {
        openGroup(hashId, { updateHash: false });
        return;
      }
      if (!nodes.has(state.currentGroupId)) registerTaxon(taxonPlaceholder(state.currentGroupId), null);
      render();
      updateLocationHash(state.currentGroupId, "replace");
    }

    function routeFromHash() {
      const hashId = hashTaxonId() || ROOT_TAXON_ID;
      if (hashId === appliedHashId && hashId === state.currentGroupId) return;
      if (hashId !== state.currentGroupId) openGroup(hashId, { updateHash: false });
      else appliedHashId = hashId;
    }

    function setTaxonChildren(group, children, totalResults = children.length) {
      group.children = children;
      group.childrenLoaded = true;
      group.childrenLoading = false;
      group.childrenError = "";
      group.childrenTotal = Number.isFinite(totalResults) ? totalResults : children.length;
      group.childrenChecked = true;
      children.forEach((child) => {
        registerTaxon(child, group.id);
        cacheTaxonMedia(child);
      });
    }

    function taxonFromInaturalist(taxon) {
      const scientific = taxon.name || `Taxon ${taxon.id}`;
      return {
        id: String(taxon.id),
        name: displayCommonName(taxon.preferred_common_name || taxon.english_common_name || scientific),
        scientific,
        rank: taxon.rank || "taxon",
        children: [],
        childrenLoaded: false,
        childrenLoading: false,
        childrenError: "",
        childrenTotal: 0,
        childrenChecked: false,
        detailsLoaded: true,
        ancestorIds: normalizeAncestorIds(taxon.ancestor_ids || taxon.ancestor_taxon_ids || []),
        imageUrl: taxonPhotoUrl(taxon),
        inaturalistUrl: inaturalistTaxonUrl(taxon)
      };
    }

    function taxonPlaceholder(id) {
      const taxonId = normalizeTaxonId(id) || ROOT_TAXON_ID;
      return {
        id: taxonId,
        name: taxonId === ROOT_TAXON_ID ? "Life" : `Taxon ${taxonId}`,
        scientific: taxonId === ROOT_TAXON_ID ? "Life" : `Taxon ${taxonId}`,
        rank: taxonId === ROOT_TAXON_ID ? "stateofmatter" : "taxon",
        children: [],
        childrenLoaded: false,
        childrenLoading: false,
        childrenError: "",
        childrenTotal: 0,
        childrenChecked: false,
        detailsLoaded: taxonId === ROOT_TAXON_ID,
        ancestorIds: [],
        imageUrl: "",
        inaturalistUrl: `${INATURALIST_TAXON_PAGE_URL}/${taxonId}`
      };
    }

    function displayCommonName(value) {
      const text = String(value || "").trim();
      return text ? text.charAt(0).toUpperCase() + text.slice(1) : "";
    }

    function cacheTaxonMedia(taxon) {
      const query = imageQueryForTaxon(taxon);
      const src = taxon.imageUrl || "";
      const taxonUrl = taxon.inaturalistUrl || "";
      if (query && (src || taxonUrl)) imageCache.set(query, { src, taxonUrl });
    }

    function loadState() {
      const fallback = { currentGroupId: ROOT_TAXON_ID, rankings: {} };
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!stored || typeof stored !== "object") return fallback;
        if (!stored.rankings || typeof stored.rankings !== "object") return fallback;
        const currentGroupId = normalizeTaxonId(stored.currentGroupId) || ROOT_TAXON_ID;
        if (!nodes.has(currentGroupId)) registerTaxon(taxonPlaceholder(currentGroupId), null);
        return { currentGroupId, rankings: stored.rankings };
      } catch {
        return fallback;
      }
    }

    function loadImageCache() {
      try {
        const entries = JSON.parse(localStorage.getItem(IMAGE_CACHE_KEY) || "[]");
        return Array.isArray(entries) ? entries : [];
      } catch {
        return [];
      }
    }

    function verifyStorage() {
      try {
        const key = `${STORAGE_KEY}:probe`;
        localStorage.setItem(key, "ok");
        localStorage.removeItem(key);
        els.saveStatus.textContent = hasSavedState() ? "Loaded local save" : "Local saves ready";
      } catch {
        els.saveStatus.textContent = "Local saves unavailable";
      }
    }

    function hasSavedState() {
      try {
        return Boolean(localStorage.getItem(STORAGE_KEY));
      } catch {
        return false;
      }
    }

    function saveState(message = "Saved locally") {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        els.saveStatus.textContent = message;
        return true;
      } catch {
        els.saveStatus.textContent = "Save failed";
        toast("Local save failed.");
        return false;
      }
    }

    function ensureRanking(groupId) {
      const group = nodes.get(groupId) || TAXONOMY;
      const childIds = group.children.map((child) => child.id);
      const valid = new Set(childIds);
      if (!state.rankings[groupId]) {
        state.rankings[groupId] = {
          unranked: [...childIds],
          tiers: emptyTiers()
        };
      }
      const ranking = state.rankings[groupId];

      const tiers = emptyTiers();
      const assigned = new Set();
      const addToTier = (tierId, ids) => {
        uniqueValid(ids, valid).forEach((id) => {
          if (assigned.has(id)) return;
          tiers[tierId].push(id);
          assigned.add(id);
        });
      };

      if (ranking.tiers && typeof ranking.tiers === "object") {
        TIER_ORDER.forEach((tierId) => addToTier(tierId, ranking.tiers[tierId]));
      }
      if (Array.isArray(ranking.ranked)) {
        addToTier("b", ranking.ranked);
      }

      ranking.tiers = tiers;
      delete ranking.ranked;
      ranking.unranked = uniqueValid(ranking.unranked, valid).filter((id) => !assigned.has(id));
      const placed = new Set([...ranking.unranked, ...assigned]);
      childIds.forEach((id) => {
        if (!placed.has(id)) ranking.unranked.push(id);
      });
      return ranking;
    }

    function emptyTiers() {
      return Object.fromEntries(TIER_ORDER.map((tierId) => [tierId, []]));
    }

    function uniqueValid(ids, valid) {
      const seen = new Set();
      return (Array.isArray(ids) ? ids : []).filter((id) => {
        if (!valid.has(id) || seen.has(id)) return false;
        seen.add(id);
        return true;
      });
    }

    function scheduleChildrenLoad(groupId) {
      const group = nodes.get(groupId);
      if (!group || group.childrenLoaded || group.childrenLoading) return;
      loadTaxonChildren(group).then(() => {
        if (state.currentGroupId === group.id) render();
      });
    }

    async function loadTaxonChildren(group) {
      if (group.childrenLoaded) return group.children;
      if (childRequests.has(group.id)) return childRequests.get(group.id);
      group.childrenLoading = true;
      group.childrenError = "";
      const request = fetchTaxonChildren(group)
        .then(async ({ children, totalResults }) => {
          setTaxonChildren(group, children, totalResults);
          await annotateChildPresence(children);
          return group.children;
        })
        .catch(() => {
          group.childrenLoaded = false;
          group.childrenLoading = false;
          group.childrenError = "Could not load subtaxa";
          return group.children;
        })
        .finally(() => childRequests.delete(group.id));
      childRequests.set(group.id, request);
      return request;
    }

    async function annotateChildPresence(children) {
      for (const child of children) {
        await checkTaxonChildPresence(child);
      }
    }

    async function checkTaxonChildPresence(taxon) {
      if (!taxon || taxon.childrenLoaded || taxon.childrenChecked) return taxon.childrenTotal || taxon.children.length;
      if (!childPresenceRequests.has(taxon.id)) {
        childPresenceRequests.set(taxon.id, fetchTaxonChildCount(taxon.id)
          .then((totalResults) => applyTaxonChildPresence(taxon.id, totalResults))
          .catch(() => null)
          .finally(() => childPresenceRequests.delete(taxon.id)));
      }
      return childPresenceRequests.get(taxon.id);
    }

    async function fetchTaxonChildCount(taxonId) {
      const url = new URL(INATURALIST_TAXA_INDEX_URL);
      url.searchParams.set("parent_id", taxonId);
      url.searchParams.set("is_active", "true");
      url.searchParams.set("per_page", "1");
      const data = await fetchInaturalistJson(url);
      return Number(data.total_results) || 0;
    }

    function applyTaxonChildPresence(taxonId, totalResults) {
      const taxon = nodes.get(String(taxonId));
      if (!taxon) return totalResults;
      taxon.childrenChecked = true;
      taxon.childrenTotal = totalResults;
      if (!totalResults && !taxon.children.length) {
        taxon.childrenLoaded = true;
        taxon.childrenLoading = false;
        taxon.childrenError = "";
      }
      return totalResults;
    }

    async function fetchTaxonChildren(group) {
      const url = new URL(INATURALIST_TAXA_INDEX_URL);
      url.searchParams.set("parent_id", group.id);
      url.searchParams.set("is_active", "true");
      url.searchParams.set("per_page", "200");
      url.searchParams.set("order", "desc");
      url.searchParams.set("order_by", "observations_count");
      const data = await fetchInaturalistJson(url);
      const children = (data.results || [])
        .filter((taxon) => String(taxon.id) !== group.id)
        .map(taxonFromInaturalist);
      return {
        children,
        totalResults: Number(data.total_results) || children.length
      };
    }

    function ensureTaxonDetails(taxonId) {
      const id = normalizeTaxonId(taxonId);
      if (!id || id === ROOT_TAXON_ID) return Promise.resolve(nodes.get(ROOT_TAXON_ID));
      if (!nodes.has(id)) registerTaxon(taxonPlaceholder(id), null);
      const node = nodes.get(id);
      if (node.detailsLoaded && node.name !== `Taxon ${id}`) return Promise.resolve(node);
      if (!taxonDetailRequests.has(id)) {
        taxonDetailRequests.set(id, fetchAndRegisterTaxon(id).finally(() => taxonDetailRequests.delete(id)));
      }
      return taxonDetailRequests.get(id);
    }

    async function fetchAndRegisterTaxon(taxonId) {
      const taxon = await fetchTaxonRecord(taxonId);
      const ancestorIds = normalizeAncestorIds(taxon.ancestor_ids || taxon.ancestor_taxon_ids || []);
      if (ancestorIds.length) await registerTaxonAncestors(ancestorIds, taxonId);
      const parentId = ancestorIds.at(-1) || "";
      const node = registerTaxon(taxonFromInaturalist(taxon), parentId);
      cacheTaxonMedia(node);
      return node;
    }

    async function registerTaxonAncestors(ancestorIds, taxonId) {
      const ids = ancestorIds.filter((id) => id !== taxonId);
      const missingIds = ids.filter((id) => !nodes.get(id)?.detailsLoaded);
      const ancestorRecords = missingIds.length ? await fetchTaxonRecords(missingIds) : [];
      const byId = new Map(ancestorRecords.map((taxon) => [String(taxon.id), taxon]));
      let parentId = "";
      ids.forEach((id) => {
        const node = byId.has(id) ? taxonFromInaturalist(byId.get(id)) : nodes.get(id) || taxonPlaceholder(id);
        const registered = registerTaxon(node, parentId || null);
        cacheTaxonMedia(registered);
        parentId = registered.id;
      });
    }

    async function fetchTaxonRecord(taxonId) {
      const records = await fetchTaxonRecords([taxonId]);
      if (!records.length) throw new Error("Taxon not found");
      return records[0];
    }

    async function fetchTaxonRecords(taxonIds) {
      const ids = taxonIds.map(normalizeTaxonId).filter(Boolean);
      if (!ids.length) return [];
      const url = new URL(`${INATURALIST_TAXA_INDEX_URL}/${ids.join(",")}`);
      url.searchParams.set("include_taxon_ancestors", "true");
      const data = await fetchInaturalistJson(url);
      return data.results || [];
    }

    function render() {
      const group = nodes.get(state.currentGroupId) || TAXONOMY;
      renderView();
      if (group.childrenLoaded) {
        ensureRanking(group.id);
        renderBoard(group);
      } else {
        renderLoadingBoard(group);
        if (AUTO_LOAD_TAXA) scheduleChildrenLoad(group.id);
      }
      if (activeView === "results") renderResults();
      if (activeView === "data") renderData();
      hydrateImages();
    }

    function renderView() {
      document.querySelectorAll("[data-view-button]").forEach((button) => {
        button.setAttribute("aria-pressed", button.dataset.viewButton === activeView ? "true" : "false");
      });
      els.rankView.hidden = activeView !== "rank";
      els.resultsView.hidden = activeView !== "results";
      els.dataView.hidden = activeView !== "data";
    }

    function renderBoard(group) {
      const ranking = ensureRanking(group.id);
      const childRank = group.children[0]?.rank || "leaf";
      els.rankSubline.textContent = `${capitalize(childRank)} level`;
      els.contextTitle.textContent = group.name;
      renderContextSummary(group, childRank);
      els.backButton.disabled = group.id === ROOT_TAXON_ID;
      els.placeLeftoversButton.disabled = !ranking.unranked.length;
      els.clearGroupButton.disabled = !countPlaced(ranking);

      els.unrankedList.dataset.empty = "No unranked cards";
      els.unrankedList.classList.toggle("empty", ranking.unranked.length === 0);
      els.trayCount.textContent = String(ranking.unranked.length);
      els.unrankedList.innerHTML = ranking.unranked.map((id) => nodes.get(id)).filter(Boolean).map(renderCard).join("");

      els.tierCount.textContent = `${countPlaced(ranking)} placed`;
      els.tierList.innerHTML = TIER_ORDER.map((tierId) => renderTierRow(tierId, ranking.tiers[tierId])).join("");
    }

    function renderLoadingBoard(group) {
      const message = group.childrenError || "Loading subtaxa...";
      els.rankSubline.textContent = `${capitalize(group.rank)} level`;
      els.contextTitle.textContent = group.name;
      renderContextSummary(group, "subtaxon");
      els.backButton.disabled = group.id === ROOT_TAXON_ID;
      els.placeLeftoversButton.disabled = true;
      els.clearGroupButton.disabled = true;
      els.unrankedList.dataset.empty = message;
      els.unrankedList.classList.add("empty");
      els.trayCount.textContent = "0";
      els.unrankedList.innerHTML = "";
      els.tierCount.textContent = "0 placed";
      els.tierList.innerHTML = TIER_ORDER.map((tierId) => renderTierRow(tierId, [])).join("");
    }

    function renderContextSummary(group, childRank) {
      const path = getPath(group.id).map((node, index) => `
        ${index ? `<span class="path-separator">/</span>` : ""}
        <button type="button" data-open-group="${escapeHtml(node.id)}">${escapeHtml(node.name)}</button>
      `).join("");
      let count = group.childrenError || "Loading subtaxa...";
      if (group.childrenLoaded) {
        const shown = group.children.length;
        const total = group.childrenTotal || shown;
        const suffix = total > shown ? `shown of ${total}` : "";
        count = shown ? `${shown}${suffix ? ` ${suffix}` : ""} ${childRank} cards` : "No subtaxa found";
      }
      els.contextSummary.innerHTML = `<span class="context-path">${path}</span><span class="context-count">- ${escapeHtml(count)}</span>`;
    }

    function renderCard(taxon) {
      const initials = taxon.name.split(/\s+/).slice(0, 2).map((part) => part[0]).join("").toUpperCase();
      const canOpen = taxon.children.length > 0 || !taxon.childrenLoaded;
      const imageQuery = imageQueryForTaxon(taxon);
      const drillLabel = taxon.childrenLoaded ? `Rank subclades of ${taxon.name}` : `Load subtaxa of ${taxon.name}`;
      const infoLabel = `Open ${taxon.name} on iNaturalist`;
      return `
        <article class="taxon-card" draggable="true" tabindex="0" data-id="${escapeHtml(taxon.id)}">
          <div class="media">
            <img alt="" data-taxon-image="${escapeHtml(imageQuery)}" data-common-name="${escapeHtml(taxon.name)}">
            <span class="fallback" aria-hidden="true">${escapeHtml(initials)}</span>
            <a class="taxon-info card-tool" href="${escapeHtml(taxon.inaturalistUrl || inaturalistSearchUrl(imageQuery))}" target="_blank" rel="noopener noreferrer" aria-label="${escapeHtml(infoLabel)}" title="${escapeHtml(infoLabel)}">i</a>
            ${canOpen ? `
              <button type="button" class="open-child card-tool" data-open-group="${escapeHtml(taxon.id)}" aria-label="${escapeHtml(drillLabel)}" title="${escapeHtml(drillLabel)}">
                <span class="magnify-icon" aria-hidden="true"></span>
              </button>
            ` : ""}
          </div>
          <div class="card-body">
            <span class="names">
              <span class="scientific">${escapeHtml(taxon.scientific)}</span>
              <span class="common">${escapeHtml(taxon.name)}</span>
            </span>
          </div>
        </article>
      `;
    }

    function imageQueryForTaxon(taxon) {
      return (taxon.scientific || taxon.name || taxon.id).trim();
    }

    function inaturalistSearchUrl(query) {
      const url = new URL(INATURALIST_TAXON_SEARCH_URL);
      url.searchParams.set("q", query);
      return url.toString();
    }

    function renderTierRow(tierId, taxonIds = []) {
      return `
        <section class="tier-row" data-tier="${escapeHtml(tierId)}" aria-label="${escapeHtml(TIER_LABELS[tierId])} tier">
          <div class="tier-label" aria-hidden="true">${escapeHtml(TIER_LABELS[tierId])}</div>
          <div class="dropzone tier-dropzone" data-list="tier:${escapeHtml(tierId)}" data-tier="${escapeHtml(tierId)}">
            ${taxonIds.map((id) => nodes.get(id)).filter(Boolean).map(renderCard).join("")}
          </div>
        </section>
      `;
    }

    function renderResults() {
      const tieredGroups = Object.entries(state.rankings)
        .filter(([groupId]) => nodes.has(groupId) && nodes.get(groupId).childrenLoaded && nodes.get(groupId).children.length)
        .map(([groupId]) => ({ group: nodes.get(groupId), ranking: ensureRanking(groupId) }))
        .filter(({ ranking }) => countPlaced(ranking) > 0);

      if (!tieredGroups.length) {
        els.resultsList.innerHTML = `<p>No tiered groups yet.</p>`;
        return;
      }

      els.resultsList.innerHTML = tieredGroups.map(({ group, ranking }) => `
        <section class="result-group">
          <h3>${escapeHtml(getPath(group.id).map((node) => node.name).join(" / "))}</h3>
          ${TIER_ORDER.map((tierId) => {
            const names = ranking.tiers[tierId]
              .map((id) => nodes.get(id)?.name)
              .filter(Boolean);
            if (!names.length) return "";
            return `<p class="result-line"><strong>${escapeHtml(TIER_LABELS[tierId])}</strong><span>${names.map(escapeHtml).join(", ")}</span></p>`;
          }).join("")}
        </section>
      `).join("");
    }

    function renderData() {
      els.dataBox.value = JSON.stringify({
        savedAt: new Date().toISOString(),
        currentGroupId: state.currentGroupId,
        rankings: state.rankings
      }, null, 2);
    }

    function maybeRunBuiltInSmoke() {
      const search = globalThis.location?.search || "";
      if (!new URLSearchParams(search).has("smoke")) return;
      const failures = [];
      const originalState = JSON.stringify(state);
      const check = (condition, message) => {
        if (!condition) failures.push(message);
      };

      try {
        const root = nodes.get(ROOT_TAXON_ID);
        setTaxonChildren(root, [
          taxonFromInaturalist({ id: 1, name: "Animalia", preferred_common_name: "Animals", rank: "kingdom" }),
          taxonFromInaturalist({ id: 47126, name: "Plantae", preferred_common_name: "Plants", rank: "kingdom" })
        ], 2);
        setTaxonChildren(nodes.get("1"), [
          taxonFromInaturalist({ id: 2, name: "Chordata", preferred_common_name: "Chordates", rank: "phylum" }),
          taxonFromInaturalist({ id: 47120, name: "Arthropoda", preferred_common_name: "Arthropods", rank: "phylum" })
        ], 2);

        state.currentGroupId = ROOT_TAXON_ID;
        state.rankings[ROOT_TAXON_ID] = {
          unranked: [],
          ranked: ["1"]
        };
        ensureRanking(ROOT_TAXON_ID);
        check(state.rankings[ROOT_TAXON_ID].tiers.b.includes("1"), "Legacy ranked data did not migrate into a tier.");

        state.rankings[ROOT_TAXON_ID] = {
          unranked: root.children.map((child) => child.id),
          tiers: emptyTiers()
        };
        ensureRanking(ROOT_TAXON_ID);
        render();
        const starterCard = els.unrankedList.querySelector?.(".taxon-card");
        const emptyTier = els.tierList.querySelector?.('[data-list="tier:s"]');
        if (starterCard && emptyTier && typeof starterCard.getBoundingClientRect === "function") {
          const starterBox = starterCard.getBoundingClientRect();
          updateInsertCue(els.unrankedList, starterBox.left, starterBox.top + starterBox.height / 2);
          check(els.unrankedList.classList.contains("drag-over"), "Insert cue did not mark the active dropzone.");
          check(starterCard.classList.contains("insert-before"), "Insert cue did not mark the target card.");
          clearInsertCue();
          check(!document.querySelector(".insert-before, .insert-after, .insert-empty, .drag-over"), "Insert cue did not clear.");
          const emptyBox = emptyTier.getBoundingClientRect();
          updateInsertCue(emptyTier, emptyBox.left + 8, emptyBox.top + 8);
          check(emptyTier.classList.contains("insert-empty"), "Insert cue did not mark an empty dropzone.");
          clearInsertCue();
        } else {
          check(renderTierRow("s", []).includes('data-list="tier:s"'), "Tier row markup did not include a tier dropzone.");
        }

        moveTaxon("1", "tier:s", 0);
        check(state.rankings[ROOT_TAXON_ID].tiers.s.includes("1"), "Root tier move failed.");

        state.currentGroupId = "1";
        render();
        check(els.contextTitle.textContent === "Animals", "Animalia drill-down did not render.");
        placeLeftovers();
        check(state.rankings["1"].unranked.length === 0, "Animalia leftovers were not placed.");
        check(state.rankings["1"].tiers.f.length === nodes.get("1").children.length, "Animalia leftovers did not land in F tier.");

        renderData();
        const exported = JSON.parse(els.dataBox.value);
        check(exported.rankings[ROOT_TAXON_ID].tiers.s.includes("1"), "Export missed root tier data.");
        check(exported.rankings["1"].tiers.f.length === nodes.get("1").children.length, "Export missed animal phylum tier data.");
      } catch (error) {
        failures.push(error.message);
      } finally {
        state = JSON.parse(originalState);
        saveState("Saved locally");
        render();
      }

      document.documentElement.dataset.smoke = failures.length ? "fail" : "pass";
      document.documentElement.dataset.smokeDetails = failures.join(" | ");
      console.log(failures.length ? `Ranker smoke failed: ${failures.join(" | ")}` : "Ranker smoke passed");
    }

    function openGroup(groupId, options = {}) {
      const id = normalizeTaxonId(groupId);
      if (!id) return;
      if (!nodes.has(id)) registerTaxon(taxonPlaceholder(id), null);
      state.currentGroupId = id;
      saveState();
      activeView = "rank";
      if (options.updateHash !== false) updateLocationHash(id, options.hashMode || "push");
      appliedHashId = id;
      const detailReady = ensureTaxonDetails(id).catch(() => null);
      render();
      detailReady.then(() => {
        if (state.currentGroupId === id) render();
      });
    }

    function onClick(event) {
      const viewButton = event.target.closest("[data-view-button]");
      if (viewButton) {
        activeView = viewButton.dataset.viewButton;
        render();
        return;
      }

      const openButton = event.target.closest("[data-open-group]");
      if (openButton && !openButton.disabled) {
        const id = openButton.dataset.openGroup;
        openGroup(id);
        return;
      }

      if (event.target.closest("#back-button")) {
        const parent = parents.get(state.currentGroupId);
        if (parent) openGroup(parent);
        return;
      }

      if (event.target.closest("#place-leftovers-button")) {
        placeLeftovers();
        return;
      }

      if (event.target.closest("#clear-group-button")) {
        clearCurrentGroup();
        return;
      }

      if (event.target.closest("#refresh-export-button")) {
        renderData();
        toast("Export refreshed.");
        return;
      }

      if (event.target.closest("#copy-export-button")) {
        copyExport();
        return;
      }

      if (event.target.closest("#import-button")) {
        importState();
        return;
      }

      if (event.target.closest("#reset-all-button")) {
        resetAll();
      }
    }

    function onDragStart(event) {
      const card = event.target.closest(".taxon-card");
      if (!card) return;
      clearInsertCue();
      draggedId = card.dataset.id;
      card.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", draggedId);
    }

    function onDragEnd(event) {
      const card = event.target.closest(".taxon-card");
      if (card) card.classList.remove("dragging");
      clearInsertCue();
      draggedId = "";
    }

    function onDragOver(event) {
      const zone = event.target.closest(".dropzone");
      if (!zone || !draggedId) return;
      event.preventDefault();
      updateInsertCue(zone, event.clientX, event.clientY);
      event.dataTransfer.dropEffect = "move";
    }

    function onDragLeave(event) {
      const zone = event.target.closest(".dropzone");
      if (zone && !zone.contains(event.relatedTarget)) clearInsertCue();
    }

    function onDrop(event) {
      const zone = event.target.closest(".dropzone");
      if (!zone) return;
      event.preventDefault();
      const id = event.dataTransfer.getData("text/plain") || draggedId;
      if (!id) return;
      const insertIndex = getInsertIndex(zone, event.clientX, event.clientY);
      clearInsertCue();
      moveTaxon(id, zone.dataset.list, insertIndex);
    }

    function updateInsertCue(zone, x, y) {
      clearInsertCue();
      zone.classList.add("drag-over");

      const cards = [...zone.querySelectorAll(".taxon-card:not(.dragging)")];
      if (!cards.length) {
        zone.classList.add("insert-empty");
        return;
      }

      const insertIndex = getInsertIndex(zone, x, y);
      const cueCard = cards[insertIndex] || cards[cards.length - 1];
      cueCard.classList.add(insertIndex >= cards.length ? "insert-after" : "insert-before");
    }

    function clearInsertCue() {
      document.querySelectorAll(".dropzone.drag-over, .dropzone.insert-empty").forEach((zone) => {
        zone.classList.remove("drag-over", "insert-empty");
      });
      document.querySelectorAll(".taxon-card.insert-before, .taxon-card.insert-after").forEach((card) => {
        card.classList.remove("insert-before", "insert-after");
      });
    }

    function getInsertIndex(zone, x, y) {
      const cards = [...zone.querySelectorAll(".taxon-card:not(.dragging)")];
      if (!cards.length) return 0;
      for (const [index, child] of cards.entries()) {
        const box = child.getBoundingClientRect();
        if (y < box.top) return index;
        if (y <= box.bottom && x < box.left + box.width / 2) return index;
      }
      return cards.length;
    }

    function moveTaxon(taxonId, destination, index) {
      const ranking = ensureRanking(state.currentGroupId);
      removeFromRanking(ranking, taxonId);
      const list = getDestinationList(ranking, destination);
      if (!list) return;
      list.splice(Math.min(index, list.length), 0, taxonId);
      saveState("Saved locally");
      render();
    }

    function getDestinationList(ranking, destination) {
      if (destination === "unranked") return ranking.unranked;
      if (!destination.startsWith("tier:")) return null;
      const tierId = destination.slice("tier:".length);
      return TIER_ORDER.includes(tierId) ? ranking.tiers[tierId] : null;
    }

    function removeFromRanking(ranking, taxonId) {
      ranking.unranked = ranking.unranked.filter((id) => id !== taxonId);
      TIER_ORDER.forEach((tierId) => {
        ranking.tiers[tierId] = ranking.tiers[tierId].filter((id) => id !== taxonId);
      });
    }

    function placeLeftovers() {
      const ranking = ensureRanking(state.currentGroupId);
      ranking.tiers.f.push(...ranking.unranked);
      ranking.unranked = [];
      saveState("Leftovers sent to F");
      render();
    }

    function clearCurrentGroup() {
      const group = nodes.get(state.currentGroupId);
      state.rankings[group.id] = {
        unranked: group.children.map((child) => child.id),
        tiers: emptyTiers()
      };
      saveState("Group cleared");
      render();
    }

    async function copyExport() {
      renderData();
      try {
        await navigator.clipboard.writeText(els.dataBox.value);
        toast("Copied.");
      } catch {
        els.dataBox.select();
        toast("Text selected.");
      }
    }

    function importState() {
      try {
        const incoming = JSON.parse(els.dataBox.value);
        if (!incoming || typeof incoming !== "object" || typeof incoming.rankings !== "object") {
          throw new Error("Missing rankings");
        }
        const currentGroupId = normalizeTaxonId(incoming.currentGroupId) || ROOT_TAXON_ID;
        if (!nodes.has(currentGroupId)) registerTaxon(taxonPlaceholder(currentGroupId), null);
        state = {
          currentGroupId,
          rankings: incoming.rankings
        };
        Object.keys(state.rankings).forEach((groupId) => {
          if (!nodes.has(groupId)) delete state.rankings[groupId];
          else ensureRanking(groupId);
        });
        saveState("Imported");
        activeView = "rank";
        updateLocationHash(state.currentGroupId, "replace");
        render();
        toast("Imported.");
      } catch (error) {
        toast(`Import failed: ${error.message}`);
      }
    }

    function resetAll() {
      state = { currentGroupId: ROOT_TAXON_ID, rankings: {} };
      localStorage.removeItem(STORAGE_KEY);
      saveState("Reset");
      activeView = "rank";
      updateLocationHash(ROOT_TAXON_ID, "replace");
      render();
    }

    function countPlaced(ranking) {
      if (!ranking) return 0;
      if (Array.isArray(ranking.ranked)) return ranking.ranked.length;
      if (ranking.tiers && typeof ranking.tiers === "object") {
        return TIER_ORDER.reduce((sum, tierId) => sum + (Array.isArray(ranking.tiers[tierId]) ? ranking.tiers[tierId].length : 0), 0);
      }
      return 0;
    }

    function getPath(groupId) {
      const path = [];
      let current = groupId;
      while (current && nodes.has(current)) {
        path.unshift(nodes.get(current));
        current = parents.get(current);
      }
      return path;
    }

    function hashTaxonId() {
      const hash = globalThis.location?.hash || "";
      return normalizeTaxonId(hash.replace(/^#/, ""));
    }

    function updateLocationHash(taxonId, mode = "push") {
      const id = normalizeTaxonId(taxonId);
      if (!id || !globalThis.history || !globalThis.location?.href || hashTaxonId() === id) return;
      const url = new URL(globalThis.location.href);
      url.hash = id;
      const method = mode === "replace" ? "replaceState" : "pushState";
      globalThis.history[method]?.call(globalThis.history, null, "", url);
      appliedHashId = id;
    }

    function normalizeTaxonId(value) {
      const id = String(value || "").trim();
      return /^\d+$/.test(id) ? id.replace(/^0+(?=\d)/, "") : "";
    }

    function normalizeAncestorIds(values) {
      return (Array.isArray(values) ? values : [])
        .map(normalizeTaxonId)
        .filter(Boolean);
    }

    function capitalize(value) {
      return value ? value.charAt(0).toUpperCase() + value.slice(1) : "";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    async function hydrateImages() {
      const images = [...document.querySelectorAll("img[data-taxon-image]:not([src])")];
      for (const img of images) {
        const query = img.dataset.taxonImage;
        if (!query) continue;
        if (imageCache.has(query)) {
          applyTaxonImageResult(img, imageCache.get(query));
          continue;
        }
        try {
          const result = await loadTaxonImage(query, img.dataset.commonName);
          applyTaxonImageResult(img, result);
        } catch {
          img.classList.add("failed");
        }
      }
    }

    function applyTaxonImageResult(img, result) {
      const { src, taxonUrl } = normalizeImageResult(result);
      if (src) {
        img.src = src;
      } else {
        img.classList.add("failed");
      }
      if (taxonUrl) setTaxonInfoUrl(img, taxonUrl);
    }

    function setTaxonInfoUrl(img, taxonUrl) {
      const link = img.closest(".taxon-card")?.querySelector(".taxon-info");
      if (link) link.href = taxonUrl;
    }

    async function loadTaxonImage(query, fallbackQuery) {
      if (!imageRequests.has(query)) {
        imageRequests.set(query, fetchTaxonImage(query, fallbackQuery).finally(() => imageRequests.delete(query)));
      }
      const result = normalizeImageResult(await imageRequests.get(query));
      imageCache.set(query, result);
      try {
        localStorage.setItem(IMAGE_CACHE_KEY, JSON.stringify([...imageCache.entries()]));
      } catch {}
      return result;
    }

    async function fetchTaxonImage(query, fallbackQuery) {
      const queries = imageQueryCandidates(query, fallbackQuery);
      let taxonUrl = "";
      for (const imageQuery of queries) {
        const result = await fetchTaxonDefaultPhoto(imageQuery);
        taxonUrl ||= result.taxonUrl;
        if (result.src) return result;
      }
      const observationQueries = queries.length > 1 ? [queries[1]] : queries;
      for (const imageQuery of observationQueries) {
        const result = await fetchObservationPhoto(imageQuery);
        taxonUrl ||= result.taxonUrl;
        if (result.src) return { ...result, taxonUrl: result.taxonUrl || taxonUrl };
      }
      return { src: "", taxonUrl };
    }

    async function fetchTaxonDefaultPhoto(query) {
      const url = new URL(INATURALIST_TAXA_AUTOCOMPLETE_URL);
      url.searchParams.set("q", query);
      url.searchParams.set("is_active", "true");
      url.searchParams.set("per_page", "8");
      const data = await fetchInaturalistJson(url);
      const match = chooseTaxonMatch(data.results || [], query);
      return {
        src: taxonPhotoUrl(match),
        taxonUrl: inaturalistTaxonUrl(match)
      };
    }

    async function fetchObservationPhoto(query) {
      const url = new URL(INATURALIST_OBSERVATIONS_URL);
      url.searchParams.set("taxon_name", query);
      url.searchParams.set("photos", "true");
      url.searchParams.set("quality_grade", "research");
      url.searchParams.set("per_page", "3");
      const data = await fetchInaturalistJson(url);
      const observation = (data.results || []).find((result) => result.photos?.length);
      return {
        src: observationPhotoUrl(observation?.photos?.[0]),
        taxonUrl: inaturalistTaxonUrl(observation?.taxon)
      };
    }

    async function fetchInaturalistJson(url) {
      await waitForInaturalistBudget();
      const response = await fetch(url.toString());
      if (response.status === 429) {
        inaturalistPausedUntil = Date.now() + retryAfterMs(response);
        throw new Error("iNaturalist rate limit");
      }
      if (!response.ok) throw new Error("No iNaturalist result");
      return response.json();
    }

    async function waitForInaturalistBudget() {
      while (true) {
        const now = Date.now();
        if (inaturalistPausedUntil > now) {
          await sleep(inaturalistPausedUntil - now);
          continue;
        }
        const freshRequestTimes = imageRequestTimes.filter((time) => now - time < INATURALIST_REQUEST_WINDOW_MS);
        imageRequestTimes.splice(0, imageRequestTimes.length, ...freshRequestTimes);
        if (imageRequestTimes.length < INATURALIST_REQUEST_LIMIT) {
          imageRequestTimes.push(now);
          return;
        }
        const oldestAllowedTime = imageRequestTimes[0] + INATURALIST_REQUEST_WINDOW_MS;
        await sleep(Math.max(0, oldestAllowedTime - now));
      }
    }

    function chooseTaxonMatch(results, query) {
      const normalizedQuery = normalizeTaxonName(query);
      const exactMatches = results.filter((taxon) => (
        normalizeTaxonName(taxon.name) === normalizedQuery
        || normalizeTaxonName(taxon.matched_term) === normalizedQuery
      ));
      return exactMatches.find(hasTaxonPhoto)
        || results.find(hasTaxonPhoto)
        || exactMatches[0]
        || results[0]
        || null;
    }

    function hasTaxonPhoto(taxon) {
      return Boolean(taxonPhotoUrl(taxon));
    }

    function taxonPhotoUrl(taxon) {
      const photo = taxon?.default_photo;
      return photo?.medium_url || photo?.square_url || photo?.url || "";
    }

    function inaturalistTaxonUrl(taxon) {
      return taxon?.id ? `${INATURALIST_TAXON_PAGE_URL}/${taxon.id}` : "";
    }

    function normalizeImageResult(result) {
      if (typeof result === "string") return { src: result, taxonUrl: "" };
      if (!result || typeof result !== "object") return { src: "", taxonUrl: "" };
      return {
        src: result.src || "",
        taxonUrl: result.taxonUrl || ""
      };
    }

    function observationPhotoUrl(photo) {
      return photo?.medium_url || mediumPhotoVariant(photo?.url || photo?.square_url || "");
    }

    function mediumPhotoVariant(url) {
      return String(url || "")
        .replace("/square.", "/medium.")
        .replace("/small.", "/medium.")
        .replace("/thumb.", "/medium.");
    }

    function imageQueryCandidates(...values) {
      const seen = new Set();
      return values.map((value) => String(value || "").trim())
        .filter((value) => {
          const key = normalizeTaxonName(value);
          if (!key || seen.has(key)) return false;
          seen.add(key);
          return true;
        });
    }

    function normalizeTaxonName(value) {
      return String(value || "").trim().toLowerCase();
    }

    function retryAfterMs(response) {
      const retryAfter = Number(response.headers?.get("Retry-After"));
      return Number.isFinite(retryAfter) && retryAfter > 0 ? retryAfter * 1000 : 60 * 1000;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    document.addEventListener("error", (event) => {
      if (event.target.matches?.("img")) event.target.classList.add("failed");
    }, true);

    function toast(message) {
      clearTimeout(toastTimer);
      els.toast.textContent = message;
      els.toast.classList.add("show");
      toastTimer = setTimeout(() => els.toast.classList.remove("show"), 1800);
    }
  </script>
</body>
</html>
