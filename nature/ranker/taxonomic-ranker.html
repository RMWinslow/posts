<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taxonomic Ranker</title>
  <meta name="description" content="A drag-and-drop prototype for ranking taxonomic clades.">
  <meta property="og:title" content="Taxonomic Ranker">
  <meta property="og:description" content="A drag-and-drop prototype for ranking taxonomic clades.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://blog.rmwinslow.com/nature/ranker/taxonomic-ranker-og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://blog.rmwinslow.com/nature/ranker/taxonomic-ranker-og.png">
  <style>
    :root {
      color-scheme: light;
      --paper: #06839a;
      --panel: #c7d9ef;
      --ink: #07162e;
      --muted: #33435f;
      --line: #6f85ad;
      --green: #13885a;
      --blue: #005bc8;
      --gold: #f2bf2c;
      --red: #b02b64;
      --violet: #5a4ec2;
      --shadow: 3px 3px 0 rgba(0, 33, 78, 0.34);
      --taxon-card-width: 164px;
      --taxon-card-height: 164px;
      --win-face: #d4e4f7;
      --win-sunken: #8fb5dc;
      --win-border-light: #ffffff;
      font-family: Tahoma, Verdana, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.13) 0 1px, transparent 1px 9px),
        linear-gradient(135deg, #004b94 0%, #0796b0 46%, #3dc8d8 100%),
        var(--paper);
      color: var(--ink);
    }

    button,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 2px outset var(--win-border-light);
      border-radius: 0;
      background: linear-gradient(#ffffff 0%, #d9ecff 42%, #98bde7 43%, #c6dcf5 100%);
      color: var(--ink);
      min-height: 30px;
      padding: 0 10px;
      cursor: pointer;
    }

    button:hover {
      background: linear-gradient(#ffffff 0%, #eaf8ff 42%, #7ccde6 43%, #c9f2ff 100%);
    }

    button:active {
      border-style: inset;
      background: linear-gradient(#83a9d8, #d6e8fb);
    }

    button.primary {
      border-color: var(--win-border-light);
      background: linear-gradient(#70e4aa 0%, #13885a 50%, #83f0bd 100%);
      color: #ffffff;
    }

    button.danger {
      color: var(--red);
    }

    button.icon {
      width: 36px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-weight: 760;
    }

    button:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    .taxon-card:focus-visible {
      outline: 3px solid rgba(49, 95, 159, 0.34);
      outline-offset: 1px;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      border-bottom: 3px ridge var(--win-border-light);
      background: linear-gradient(#dffcff 0%, #6ad4f2 38%, #006ad4 39%, #003f9f 100%);
      position: sticky;
      top: 0;
      z-index: 20;
      color: #ffffff;
    }

    .topbar {
      width: min(1440px, calc(100vw - 32px));
      margin: 0 auto;
      min-height: 60px;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .brand {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 2vw, 1.8rem);
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 1px 1px 0 #001f66;
    }

    .subline {
      margin-top: 4px;
      color: #e6fbff;
      font-size: 0.84rem;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 4px #ffffff;
      display: inline-block;
    }

    .tabs {
      display: flex;
      gap: 4px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .tabs button[aria-pressed="true"] {
      border-style: inset;
      background: linear-gradient(#002968, #0066d8);
      border-color: var(--win-border-light);
      color: #ffffff;
    }

    main {
      width: min(1440px, calc(100vw - 32px));
      margin: 12px auto 28px;
      display: grid;
      gap: 10px;
    }

    .rank-view {
      display: block;
    }

    .board,
    .panel {
      background: var(--panel);
      border: 3px outset var(--win-border-light);
      border-radius: 0;
      box-shadow: var(--shadow);
    }

    .board {
      min-width: 0;
      overflow: hidden;
    }

    .board-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 10px;
      border-bottom: 3px ridge var(--win-border-light);
      background: linear-gradient(90deg, #eaf8ff 0%, #b9d9f6 48%, #8fc5ef 100%);
    }

    .context h2 {
      margin: 0;
      font-size: clamp(1.25rem, 1.8vw, 1.65rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .context p {
      margin: 4px 0 0;
      color: var(--muted);
      line-height: 1.25;
    }

    .context-path {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 4px;
    }

    .context-path button {
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--blue);
      line-height: inherit;
      text-decoration: underline;
    }

    .context-path button:hover {
      background: transparent;
      text-decoration: underline;
    }

    .path-separator,
    .context-count {
      color: var(--muted);
    }

    .context-count {
      margin-left: 4px;
    }

    .commands {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(330px, 380px) minmax(0, 1fr);
      min-height: 640px;
    }

    .tray {
      border-right: 3px ridge var(--win-border-light);
      background: #bdd9e9;
      padding: 8px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
      min-width: 0;
    }

    .tray-head,
    .ranked-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      padding: 0 2px;
    }

    .tray-title,
    .ranked-title {
      font-weight: 820;
      color: #052244;
      text-shadow: 1px 1px 0 #ffffff;
    }

    .list-count {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .dropzone {
      min-height: 112px;
      border: 2px inset var(--win-border-light);
      border-radius: 0;
      padding: 2px;
      display: grid;
      grid-template-columns: repeat(auto-fill, var(--taxon-card-width));
      align-content: start;
      align-items: start;
      justify-content: start;
      gap: 2px;
      transition: background 120ms ease, border-color 120ms ease;
    }

    .dropzone.drag-over {
      border-color: var(--blue);
      background: #a7ebff;
    }

    .dropzone.empty::after {
      content: attr(data-empty);
      color: #768179;
      font-size: 0.84rem;
      padding: 8px;
    }

    .ranked-panel {
      min-width: 0;
      padding: 8px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
      background: #cbd9f2;
    }

    .ranked-list {
      min-height: 580px;
    }

    .tray .dropzone {
      overflow-y: auto;
      max-height: 580px;
    }

    .taxon-card {
      width: var(--taxon-card-width);
      height: var(--taxon-card-height);
      border: 2px outset var(--win-border-light);
      border-radius: 0;
      background: var(--win-face);
      min-width: 0;
      overflow: hidden;
      box-shadow: none;
      cursor: grab;
      display: block;
      position: relative;
    }

    .taxon-card.dragging {
      opacity: 0.55;
      cursor: grabbing;
      border-style: inset;
    }

    .media {
      position: relative;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #9bdbe9 0%, #c3d2f7 52%, #ffe06b 100%);
    }

    .media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    .media .fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 2.1rem;
      font-weight: 840;
      color: rgba(23, 32, 38, 0.72);
      z-index: 0;
    }

    .media img:not([src]),
    .media img.failed {
      display: none;
    }

    .card-body {
      min-width: 0;
      position: absolute;
      left: 5px;
      right: 5px;
      bottom: 5px;
      z-index: 2;
      padding: 5px 6px;
      display: grid;
      gap: 3px;
      align-content: start;
      overflow: hidden;
      border: 4px ridge rgba(238, 238, 238, 0.82);
      background: linear-gradient(rgba(0, 53, 117, 0.82), rgba(3, 20, 54, 0.82));
      color: #ffffff;
      text-shadow: 1px 1px 0 #000000;
    }

    .names {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .common {
      display: block;
      font-weight: 760;
      font-size: 0.8rem;
      line-height: 1.15;
      overflow-wrap: anywhere;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .scientific {
      display: block;
      color: #eeeeee;
      font-size: 0.76rem;
      font-style: italic;
      line-height: 1.15;
      overflow-wrap: anywhere;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .open-child {
      position: absolute;
      top: 4px;
      right: 4px;
      z-index: 2;
      width: 26px;
      height: 26px;
      min-height: 26px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 2px outset var(--win-border-light);
      border-radius: 0;
      background: linear-gradient(#ffffff 0%, #d4eeff 48%, #92b7e4 49%, #d3e9ff 100%);
      color: #111111;
    }

    .magnify-icon {
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-radius: 50%;
      display: block;
      position: relative;
    }

    .magnify-icon::after {
      content: "";
      width: 7px;
      height: 2px;
      background: currentColor;
      position: absolute;
      right: -6px;
      bottom: -3px;
      transform: rotate(45deg);
      transform-origin: center;
    }

    .panel {
      padding: 10px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 1.35rem;
    }

    .results-list {
      display: grid;
      gap: 8px;
    }

    .result-group {
      border: 3px inset var(--win-border-light);
      border-radius: 0;
      background: #e5f4ff;
      padding: 8px;
    }

    .result-group h3 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .result-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 4px 0;
      color: var(--muted);
      line-height: 1.3;
    }

    .result-line strong {
      color: var(--ink);
      min-width: 30px;
    }

    textarea {
      width: 100%;
      min-height: 360px;
      resize: vertical;
      border: 3px inset var(--win-border-light);
      border-radius: 0;
      padding: 8px;
      background: #f3fbff;
      color: var(--ink);
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .data-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(420px, calc(100vw - 36px));
      padding: 8px 10px;
      border: 3px outset var(--win-border-light);
      border-radius: 0;
      background: linear-gradient(#006ad4, #003f9f);
      color: #ffffff;
      box-shadow: var(--shadow);
      transform: translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 50;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 1040px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .tray {
        border-right: 0;
        border-bottom: 3px ridge var(--win-border-light);
      }

      .tray .dropzone {
        max-height: none;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        width: min(100vw - 20px, 1440px);
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 8px 0;
      }

      main {
        width: min(100vw - 20px, 1440px);
        margin-top: 12px;
      }

      .tabs,
      .commands {
        justify-content: flex-start;
      }

      .board-head {
        grid-template-columns: 1fr;
      }

      .ranked-list,
      .tray .dropzone {
        grid-template-columns: repeat(auto-fill, var(--taxon-card-width));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topbar">
        <div class="brand">
          <h1>Taxonomic Ranker</h1>
          <div class="subline">
            <span id="rank-subline">Top-down clade sorting</span>
            <span class="dot" aria-hidden="true"></span>
            <span id="save-status">Checking local saves</span>
          </div>
        </div>
        <nav class="tabs" aria-label="Views">
          <button type="button" data-view-button="rank" aria-pressed="true">Rank</button>
          <button type="button" data-view-button="results" aria-pressed="false">Results</button>
          <button type="button" data-view-button="data" aria-pressed="false">Data</button>
        </nav>
      </div>
    </header>

    <main>
      <section id="rank-view" class="rank-view" aria-label="Rank workspace">
        <section class="board">
          <div class="board-head">
            <div class="context">
              <h2 id="context-title">Life</h2>
              <p id="context-summary"></p>
            </div>
            <div class="commands">
              <button type="button" id="back-button">Back</button>
              <button type="button" id="place-leftovers-button">Append leftovers</button>
              <button type="button" id="clear-group-button" class="danger">Clear group</button>
            </div>
          </div>

          <div class="workspace">
            <section class="tray" aria-label="Unranked taxa">
              <div class="tray-head">
                <span class="tray-title">Unranked</span>
                <span id="tray-count" class="list-count">0</span>
              </div>
              <div id="unranked-list" class="dropzone" data-list="unranked" data-empty="No unranked cards"></div>
            </section>

            <section class="ranked-panel" aria-label="Ranked taxa">
              <div class="ranked-head">
                <span class="ranked-title">Preference order</span>
                <span id="ranked-count" class="list-count">0</span>
              </div>
              <div id="ranked-list" class="dropzone ranked-list" data-list="ranked" data-empty="No ranked cards"></div>
            </section>
          </div>
        </section>
      </section>

      <section id="results-view" class="panel" hidden>
        <h2>Results</h2>
        <div id="results-list" class="results-list"></div>
      </section>

      <section id="data-view" class="panel" hidden>
        <h2>Data</h2>
        <div class="data-actions">
          <button type="button" id="refresh-export-button" class="primary">Refresh export</button>
          <button type="button" id="copy-export-button">Copy</button>
          <button type="button" id="import-button">Import</button>
          <button type="button" id="reset-all-button" class="danger">Reset all</button>
        </div>
        <textarea id="data-box" spellcheck="false"></textarea>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "rmw-taxonomic-ranker-v1";
    const RANK_ORDER = ["root", "kingdom", "phylum", "class", "order"];
    const LEGACY_TIER_ORDER = ["s", "a", "b", "c", "d"];

    function t(id, name, scientific, rank, wiki, children = []) {
      return { id, name, scientific, rank, wiki, children };
    }

    const TAXONOMY = t("life", "Life", "Biota", "root", "Life", [
      t("animalia", "Animals", "Animalia", "kingdom", "Animal", [
        t("chordata", "Chordates", "Chordata", "phylum", "Chordate", [
          t("mammalia", "Mammals", "Mammalia", "class", "Mammal", [
            t("primates", "Primates", "Primates", "order", "Primate"),
            t("carnivora", "Carnivorans", "Carnivora", "order", "Carnivora"),
            t("cetartiodactyla", "Whales and even-toed ungulates", "Cetartiodactyla", "order", "Cetartiodactyla"),
            t("rodentia", "Rodents", "Rodentia", "order", "Rodent"),
            t("chiroptera", "Bats", "Chiroptera", "order", "Bat")
          ]),
          t("aves", "Birds", "Aves", "class", "Bird", [
            t("passeriformes", "Perching birds", "Passeriformes", "order", "Passerine"),
            t("accipitriformes", "Hawks and eagles", "Accipitriformes", "order", "Accipitriformes"),
            t("psittaciformes", "Parrots", "Psittaciformes", "order", "Parrot"),
            t("strigiformes", "Owls", "Strigiformes", "order", "Owl"),
            t("anseriformes", "Waterfowl", "Anseriformes", "order", "Anseriformes")
          ]),
          t("actinopterygii", "Ray-finned fishes", "Actinopterygii", "class", "Actinopterygii", [
            t("perciformes", "Perch-like fishes", "Perciformes", "order", "Perciformes"),
            t("salmoniformes", "Salmon and trout", "Salmoniformes", "order", "Salmonidae"),
            t("cypriniformes", "Carps and minnows", "Cypriniformes", "order", "Cypriniformes"),
            t("syngnathiformes", "Seahorses and pipefishes", "Syngnathiformes", "order", "Syngnathiformes")
          ]),
          t("reptilia", "Reptiles", "Reptilia", "class", "Reptile", [
            t("squamata", "Scaled reptiles", "Squamata", "order", "Squamata"),
            t("testudines", "Turtles", "Testudines", "order", "Turtle"),
            t("crocodilia", "Crocodilians", "Crocodilia", "order", "Crocodilia")
          ])
        ]),
        t("arthropoda", "Arthropods", "Arthropoda", "phylum", "Arthropod", [
          t("insecta", "Insects", "Insecta", "class", "Insect", [
            t("lepidoptera", "Butterflies and moths", "Lepidoptera", "order", "Lepidoptera"),
            t("coleoptera", "Beetles", "Coleoptera", "order", "Beetle"),
            t("hymenoptera", "Ants, bees, and wasps", "Hymenoptera", "order", "Hymenoptera"),
            t("diptera", "Flies", "Diptera", "order", "Fly")
          ]),
          t("arachnida", "Arachnids", "Arachnida", "class", "Arachnid", [
            t("araneae", "Spiders", "Araneae", "order", "Spider"),
            t("scorpiones", "Scorpions", "Scorpiones", "order", "Scorpion"),
            t("opiliones", "Harvestmen", "Opiliones", "order", "Opiliones")
          ]),
          t("malacostraca", "Crabs, shrimp, and kin", "Malacostraca", "class", "Malacostraca", [
            t("decapoda", "Decapods", "Decapoda", "order", "Decapoda"),
            t("isopoda", "Isopods", "Isopoda", "order", "Isopoda"),
            t("amphipoda", "Amphipods", "Amphipoda", "order", "Amphipoda")
          ])
        ]),
        t("mollusca", "Mollusks", "Mollusca", "phylum", "Mollusca", [
          t("gastropoda", "Snails and slugs", "Gastropoda", "class", "Gastropoda", [
            t("stylommatophora", "Land snails and slugs", "Stylommatophora", "order", "Stylommatophora"),
            t("nudibranchia", "Nudibranchs", "Nudibranchia", "order", "Nudibranch"),
            t("neogastropoda", "Predatory sea snails", "Neogastropoda", "order", "Neogastropoda")
          ]),
          t("cephalopoda", "Cephalopods", "Cephalopoda", "class", "Cephalopod", [
            t("octopoda", "Octopuses", "Octopoda", "order", "Octopus"),
            t("teuthida", "Squids", "Teuthida", "order", "Squid"),
            t("sepiida", "Cuttlefish", "Sepiida", "order", "Cuttlefish")
          ]),
          t("bivalvia", "Bivalves", "Bivalvia", "class", "Bivalvia", [
            t("ostreida", "Oysters", "Ostreida", "order", "Oyster"),
            t("pectinida", "Scallops", "Pectinida", "order", "Scallop"),
            t("mytilida", "Mussels", "Mytilida", "order", "Mussel")
          ])
        ])
      ]),
      t("plantae", "Plants", "Plantae", "kingdom", "Plant", [
        t("tracheophyta", "Vascular plants", "Tracheophyta", "phylum", "Vascular plant", [
          t("magnoliopsida", "Eudicots", "Magnoliopsida", "class", "Eudicots", [
            t("rosales", "Roses, figs, and nettles", "Rosales", "order", "Rosales"),
            t("asterales", "Daisies and bellflowers", "Asterales", "order", "Asterales"),
            t("fabales", "Legumes", "Fabales", "order", "Fabales"),
            t("fagales", "Oaks and beeches", "Fagales", "order", "Fagales")
          ]),
          t("liliopsida", "Monocots", "Liliopsida", "class", "Monocotyledon", [
            t("poales", "Grasses and sedges", "Poales", "order", "Poales"),
            t("asparagales", "Orchids and asparagus", "Asparagales", "order", "Asparagales"),
            t("zingiberales", "Gingers and bananas", "Zingiberales", "order", "Zingiberales")

    const nodes = new Map();
    const parents = new Map();
    const imageCache = new Map(loadImageCache());
    let activeView = "rank";
    let draggedId = "";
    let toastTimer = 0;

    indexTree(TAXONOMY, null);
    let state = loadState();

    const els = {
      rankSubline: document.querySelector("#rank-subline"),
      saveStatus: document.querySelector("#save-status"),
      rankView: document.querySelector("#rank-view"),
      resultsView: document.querySelector("#results-view"),
      dataView: document.querySelector("#data-view"),
      contextTitle: document.querySelector("#context-title"),
      contextSummary: document.querySelector("#context-summary"),
      backButton: document.querySelector("#back-button"),
      placeLeftoversButton: document.querySelector("#place-leftovers-button"),
      clearGroupButton: document.querySelector("#clear-group-button"),
      unrankedList: document.querySelector("#unranked-list"),
      trayCount: document.querySelector("#tray-count"),
      rankedList: document.querySelector("#ranked-list"),
      rankedCount: document.querySelector("#ranked-count"),
      resultsList: document.querySelector("#results-list"),
      dataBox: document.querySelector("#data-box"),
      toast: document.querySelector("#toast")
    };

    document.addEventListener("click", onClick);
    document.addEventListener("dragstart", onDragStart);
    document.addEventListener("dragend", onDragEnd);
    document.addEventListener("dragover", onDragOver);
    document.addEventListener("dragleave", onDragLeave);
    document.addEventListener("drop", onDrop);

    verifyStorage();
    render();
    maybeRunBuiltInSmoke();

    function indexTree(node, parentId) {
      nodes.set(node.id, node);
      if (parentId) parents.set(node.id, parentId);
      node.children.forEach((child) => indexTree(child, node.id));
    }

    function loadState() {
      const fallback = { currentGroupId: "life", rankings: {} };
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!stored || typeof stored !== "object") return fallback;
        if (!stored.rankings || typeof stored.rankings !== "object") return fallback;
        if (!nodes.has(stored.currentGroupId)) stored.currentGroupId = "life";
        return { currentGroupId: stored.currentGroupId || "life", rankings: stored.rankings };
      } catch {
        return fallback;
      }
    }

    function loadImageCache() {
      try {
        const entries = JSON.parse(localStorage.getItem(`${STORAGE_KEY}:images`) || "[]");
        return Array.isArray(entries) ? entries : [];
      } catch {
        return [];
      }
    }

    function verifyStorage() {
      try {
        const key = `${STORAGE_KEY}:probe`;
        localStorage.setItem(key, "ok");
        localStorage.removeItem(key);
        els.saveStatus.textContent = hasSavedState() ? "Loaded local save" : "Local saves ready";
      } catch {
        els.saveStatus.textContent = "Local saves unavailable";
      }
    }

    function hasSavedState() {
      try {
        return Boolean(localStorage.getItem(STORAGE_KEY));
      } catch {
        return false;
      }
    }

    function saveState(message = "Saved locally") {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        els.saveStatus.textContent = message;
        return true;
      } catch {
        els.saveStatus.textContent = "Save failed";
        toast("Local save failed.");
        return false;
      }
    }

    function ensureRanking(groupId) {
      const group = nodes.get(groupId) || TAXONOMY;
      const childIds = group.children.map((child) => child.id);
      const valid = new Set(childIds);
      if (!state.rankings[groupId]) {
        state.rankings[groupId] = {
          unranked: [...childIds],
          ranked: []
        };
      }
      const ranking = state.rankings[groupId];
      if (!Array.isArray(ranking.ranked) && ranking.tiers && typeof ranking.tiers === "object") {
        ranking.ranked = LEGACY_TIER_ORDER.flatMap((tierId) => Array.isArray(ranking.tiers[tierId]) ? ranking.tiers[tierId] : []);
      }
      ranking.ranked = uniqueValid(ranking.ranked, valid);
      ranking.unranked = uniqueValid(ranking.unranked, valid).filter((id) => !ranking.ranked.includes(id));
      delete ranking.tiers;
      const placed = new Set([...ranking.unranked, ...ranking.ranked]);
      childIds.forEach((id) => {
        if (!placed.has(id)) ranking.unranked.push(id);
      });
      return ranking;
    }

    function uniqueValid(ids, valid) {
      const seen = new Set();
      return (Array.isArray(ids) ? ids : []).filter((id) => {
        if (!valid.has(id) || seen.has(id)) return false;
        seen.add(id);
        return true;
      });
    }

    function render() {
      const group = nodes.get(state.currentGroupId) || TAXONOMY;
      ensureRanking(group.id);
      renderView();
      renderBoard(group);
      if (activeView === "results") renderResults();
      if (activeView === "data") renderData();
      hydrateImages();
    }

    function renderView() {
      document.querySelectorAll("[data-view-button]").forEach((button) => {
        button.setAttribute("aria-pressed", button.dataset.viewButton === activeView ? "true" : "false");
      });
      els.rankView.hidden = activeView !== "rank";
      els.resultsView.hidden = activeView !== "results";
      els.dataView.hidden = activeView !== "data";
    }

    function renderBoard(group) {
      const ranking = ensureRanking(group.id);
      const childRank = group.children[0]?.rank || "leaf";
      els.rankSubline.textContent = `${capitalize(childRank)} level`;
      els.contextTitle.textContent = group.name;
      renderContextSummary(group, childRank);
      els.backButton.disabled = group.id === "life";
      els.placeLeftoversButton.disabled = !ranking.unranked.length;
      els.clearGroupButton.disabled = !countPlaced(ranking);

      els.unrankedList.classList.toggle("empty", ranking.unranked.length === 0);
      els.trayCount.textContent = String(ranking.unranked.length);
      els.unrankedList.innerHTML = ranking.unranked.map((id) => renderCard(nodes.get(id))).join("");

      els.rankedList.classList.toggle("empty", ranking.ranked.length === 0);
      els.rankedCount.textContent = String(ranking.ranked.length);
      els.rankedList.innerHTML = ranking.ranked.map((id) => renderCard(nodes.get(id))).join("");
    }

    function renderContextSummary(group, childRank) {
      const path = getPath(group.id).map((node, index) => `
        ${index ? `<span class="path-separator">/</span>` : ""}
        <button type="button" data-open-group="${escapeHtml(node.id)}">${escapeHtml(node.name)}</button>
      `).join("");
      const count = group.children.length ? `${group.children.length} ${childRank} cards` : "No children in this prototype";
      els.contextSummary.innerHTML = `<span class="context-path">${path}</span><span class="context-count">- ${escapeHtml(count)}</span>`;
    }

    function renderCard(taxon) {
      const initials = taxon.name.split(/\s+/).slice(0, 2).map((part) => part[0]).join("").toUpperCase();
      const hasChildren = taxon.children.length > 0;
      const drillLabel = `Rank subclades of ${taxon.name}`;
      return `
        <article class="taxon-card" draggable="true" tabindex="0" data-id="${escapeHtml(taxon.id)}">
          <div class="media">
            <img alt="" data-wiki-image="${escapeHtml(taxon.wiki)}">
            <span class="fallback" aria-hidden="true">${escapeHtml(initials)}</span>
            ${hasChildren ? `
              <button type="button" class="open-child" data-open-group="${escapeHtml(taxon.id)}" aria-label="${escapeHtml(drillLabel)}" title="${escapeHtml(drillLabel)}">
                <span class="magnify-icon" aria-hidden="true"></span>
              </button>
            ` : ""}
          </div>
          <div class="card-body">
            <span class="names">
              <span class="scientific">${escapeHtml(taxon.scientific)}</span>
              <span class="common">${escapeHtml(taxon.name)}</span>
            </span>
          </div>
        </article>
      `;
    }

    function renderResults() {
      const rankedGroups = Object.entries(state.rankings)
        .filter(([groupId]) => nodes.has(groupId) && nodes.get(groupId).children.length)
        .map(([groupId, ranking]) => ({ group: nodes.get(groupId), ranking }))
        .filter(({ ranking }) => countPlaced(ranking) > 0);

      if (!rankedGroups.length) {
        els.resultsList.innerHTML = `<p>No ranked groups yet.</p>`;
        return;
      }

      els.resultsList.innerHTML = rankedGroups.map(({ group, ranking }) => `
        <section class="result-group">
          <h3>${escapeHtml(getPath(group.id).map((node) => node.name).join(" / "))}</h3>
          ${ranking.ranked.map((id, index) => {
            const name = nodes.get(id)?.name;
            if (!name) return "";
            return `<p class="result-line"><strong>${index + 1}</strong><span>${escapeHtml(name)}</span></p>`;
          }).join("")}
        </section>
      `).join("");
    }

    function renderData() {
      els.dataBox.value = JSON.stringify({
        savedAt: new Date().toISOString(),
        currentGroupId: state.currentGroupId,
        rankings: state.rankings
      }, null, 2);
    }

    function maybeRunBuiltInSmoke() {
      const search = globalThis.location?.search || "";
      if (!new URLSearchParams(search).has("smoke")) return;
      const failures = [];
      const originalState = JSON.stringify(state);
      const check = (condition, message) => {
        if (!condition) failures.push(message);
      };

      try {
        const orderPaths = [...nodes.values()]
          .filter((node) => node.rank === "order")
          .map((node) => getPath(node.id).map((pathNode) => pathNode.rank).join(">"));
        check(orderPaths.length >= 50, "Expected at least 50 order-level starter cards.");
        check(orderPaths.every((path) => path === "root>kingdom>phylum>class>order"), "A starter order is not on the expected top-down path.");

        state.currentGroupId = "life";
        ensureRanking("life");
        moveTaxon("animalia", "ranked", 0);
        check(state.rankings.life.ranked.includes("animalia"), "Root ranking move failed.");

        state.currentGroupId = "animalia";
        render();
        check(els.contextTitle.textContent === "Animals", "Animalia drill-down did not render.");
        placeLeftovers();
        check(state.rankings.animalia.unranked.length === 0, "Animalia leftovers were not placed.");

        renderData();
        const exported = JSON.parse(els.dataBox.value);
        check(exported.rankings.life.ranked.includes("animalia"), "Export missed root ranking.");
        check(exported.rankings.animalia.ranked.length === nodes.get("animalia").children.length, "Export missed animal phylum ranking.");
      } catch (error) {
        failures.push(error.message);
      } finally {
        state = JSON.parse(originalState);
        saveState("Saved locally");
        render();
      }

      document.documentElement.dataset.smoke = failures.length ? "fail" : "pass";
      document.documentElement.dataset.smokeDetails = failures.join(" | ");
      console.log(failures.length ? `Ranker smoke failed: ${failures.join(" | ")}` : "Ranker smoke passed");
    }

    function onClick(event) {
      const viewButton = event.target.closest("[data-view-button]");
      if (viewButton) {
        activeView = viewButton.dataset.viewButton;
        render();
        return;
      }

      const openButton = event.target.closest("[data-open-group]");
      if (openButton && !openButton.disabled) {
        const id = openButton.dataset.openGroup;
        if (nodes.has(id)) {
          state.currentGroupId = id;
          saveState();
          activeView = "rank";
          render();
        }
        return;
      }

      if (event.target.closest("#back-button")) {
        const parent = parents.get(state.currentGroupId);
        if (parent) {
          state.currentGroupId = parent;
          saveState();
          render();
        }
        return;
      }

      if (event.target.closest("#place-leftovers-button")) {
        placeLeftovers();
        return;
      }

      if (event.target.closest("#clear-group-button")) {
        clearCurrentGroup();
        return;
      }

      if (event.target.closest("#refresh-export-button")) {
        renderData();
        toast("Export refreshed.");
        return;
      }

      if (event.target.closest("#copy-export-button")) {
        copyExport();
        return;
      }

      if (event.target.closest("#import-button")) {
        importState();
        return;
      }

      if (event.target.closest("#reset-all-button")) {
        resetAll();
      }
    }

    function onDragStart(event) {
      const card = event.target.closest(".taxon-card");
      if (!card) return;
      draggedId = card.dataset.id;
      card.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", draggedId);
    }

    function onDragEnd(event) {
      const card = event.target.closest(".taxon-card");
      if (card) card.classList.remove("dragging");
      document.querySelectorAll(".dropzone.drag-over").forEach((zone) => zone.classList.remove("drag-over"));
      draggedId = "";
    }

    function onDragOver(event) {
      const zone = event.target.closest(".dropzone");
      if (!zone || !draggedId) return;
      event.preventDefault();
      zone.classList.add("drag-over");
      event.dataTransfer.dropEffect = "move";
    }

    function onDragLeave(event) {
      const zone = event.target.closest(".dropzone");
      if (zone && !zone.contains(event.relatedTarget)) zone.classList.remove("drag-over");
    }

    function onDrop(event) {
      const zone = event.target.closest(".dropzone");
      if (!zone) return;
      event.preventDefault();
      zone.classList.remove("drag-over");
      const id = event.dataTransfer.getData("text/plain") || draggedId;
      if (!id) return;
      const insertIndex = getInsertIndex(zone, event.clientX, event.clientY);
      moveTaxon(id, zone.dataset.list, insertIndex);
    }

    function getInsertIndex(zone, x, y) {
      const cards = [...zone.querySelectorAll(".taxon-card:not(.dragging)")];
      if (!cards.length) return 0;
      for (const [index, child] of cards.entries()) {
        const box = child.getBoundingClientRect();
        if (y < box.top) return index;
        if (y <= box.bottom && x < box.left + box.width / 2) return index;
      }
      return cards.length;
    }

    function moveTaxon(taxonId, destination, index) {
      const ranking = ensureRanking(state.currentGroupId);
      removeFromRanking(ranking, taxonId);
      const list = destination === "unranked" ? ranking.unranked : ranking.ranked;
      if (!list) return;
      list.splice(Math.min(index, list.length), 0, taxonId);
      saveState("Saved locally");
      render();
    }

    function removeFromRanking(ranking, taxonId) {
      ranking.unranked = ranking.unranked.filter((id) => id !== taxonId);
      ranking.ranked = ranking.ranked.filter((id) => id !== taxonId);
    }

    function placeLeftovers() {
      const ranking = ensureRanking(state.currentGroupId);
      ranking.ranked.push(...ranking.unranked);
      ranking.unranked = [];
      saveState("Leftovers placed");
      render();
    }

    function clearCurrentGroup() {
      const group = nodes.get(state.currentGroupId);
      state.rankings[group.id] = {
        unranked: group.children.map((child) => child.id),
        ranked: []
      };
      saveState("Group cleared");
      render();
    }

    async function copyExport() {
      renderData();
      try {
        await navigator.clipboard.writeText(els.dataBox.value);
        toast("Copied.");
      } catch {
        els.dataBox.select();
        toast("Text selected.");
      }
    }

    function importState() {
      try {
        const incoming = JSON.parse(els.dataBox.value);
        if (!incoming || typeof incoming !== "object" || typeof incoming.rankings !== "object") {
          throw new Error("Missing rankings");
        }
        state = {
          currentGroupId: nodes.has(incoming.currentGroupId) ? incoming.currentGroupId : "life",
          rankings: incoming.rankings
        };
        Object.keys(state.rankings).forEach((groupId) => {
          if (!nodes.has(groupId)) delete state.rankings[groupId];
        });
        saveState("Imported");
        activeView = "rank";
        render();
        toast("Imported.");
      } catch (error) {
        toast(`Import failed: ${error.message}`);
      }
    }

    function resetAll() {
      state = { currentGroupId: "life", rankings: {} };
      localStorage.removeItem(STORAGE_KEY);
      saveState("Reset");
      activeView = "rank";
      render();
    }

    function countPlaced(ranking) {
      if (!ranking) return 0;
      if (Array.isArray(ranking.ranked)) return ranking.ranked.length;
      if (ranking.tiers && typeof ranking.tiers === "object") {
        return LEGACY_TIER_ORDER.reduce((sum, tierId) => sum + (Array.isArray(ranking.tiers[tierId]) ? ranking.tiers[tierId].length : 0), 0);
      }
      return 0;
    }

    function getPath(groupId) {
      const path = [];
      let current = groupId;
      while (current && nodes.has(current)) {
        path.unshift(nodes.get(current));
        current = parents.get(current);
      }
      return path;
    }

    function capitalize(value) {
      return value ? value.charAt(0).toUpperCase() + value.slice(1) : "";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    async function hydrateImages() {
      const images = [...document.querySelectorAll("img[data-wiki-image]:not([src])")];
      for (const img of images) {
        const page = img.dataset.wikiImage;
        const cached = imageCache.get(page);
        if (cached) {
          img.src = cached;
          continue;
        }
        try {
          const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(page)}`);
          if (!response.ok) throw new Error("No image");
          const data = await response.json();
          const source = data.thumbnail?.source || data.originalimage?.source;
          if (!source) throw new Error("No thumbnail");
          imageCache.set(page, source);
          localStorage.setItem(`${STORAGE_KEY}:images`, JSON.stringify([...imageCache.entries()]));
          img.src = source;
        } catch {
          img.classList.add("failed");
        }
      }
    }

    document.addEventListener("error", (event) => {
      if (event.target.matches?.("img")) event.target.classList.add("failed");
    }, true);

    function toast(message) {
      clearTimeout(toastTimer);
      els.toast.textContent = message;
      els.toast.classList.add("show");
      toastTimer = setTimeout(() => els.toast.classList.remove("show"), 1800);
    }
  </script>
</body>
</html>
