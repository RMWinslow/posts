<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Heightmap Skeletonize POC</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 24px;
    }

    form {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
    }

    figure {
      margin: 0;
    }

    figcaption {
      margin-bottom: 4px;
      font-size: 14px;
    }

    canvas {
      border: 1px solid #999;
      image-rendering: pixelated;
      max-width: 420px;
      height: auto;
    }

    pre {
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Heightmap Skeletonize POC</h1>

  <form id="controls">
    <label>
      Quantized levels
      <input id="levelsInput" type="range" min="4" max="32" step="1" value="16">
      <output id="levelsOutput">16</output>
    </label>
    <label>
      <input id="sourceLevelsInput" type="checkbox">
      Keep 256 source levels
    </label>
    <label>
      <input id="skipLowestInput" type="checkbox" checked>
      Skip lowest terrace
    </label>
    <label>
      <input id="denseAnchorsInput" type="checkbox">
      Fit spline to every source pixel
    </label>
    <label>
      Load another image
      <input id="fileInput" type="file" accept="image/*">
    </label>
    <button type="submit">Run skeletonize</button>
  </form>

  <div class="grid">
    <figure>
      <figcaption>Source heightmap</figcaption>
      <canvas id="sourceCanvas"></canvas>
    </figure>
    <figure>
      <figcaption>Quantized terraces</figcaption>
      <canvas id="quantizedCanvas"></canvas>
    </figure>
    <figure>
      <figcaption>Skeleton pixels</figcaption>
      <canvas id="skeletonCanvas"></canvas>
    </figure>
    <figure>
      <figcaption>Skeleton overlay</figcaption>
      <canvas id="overlayCanvas"></canvas>
    </figure>
    <figure>
      <figcaption>B-spline heightAndSlope RGB</figcaption>
      <canvas id="splineCanvas"></canvas>
    </figure>
    <figure>
      <figcaption>B-spline R grayscale (height)</figcaption>
      <canvas id="splineHeightCanvas"></canvas>
    </figure>
    <figure>
      <figcaption>B-spline G grayscale (x slope)</figcaption>
      <canvas id="splineSlopeXCanvas"></canvas>
    </figure>
    <figure>
      <figcaption>B-spline B grayscale (y slope)</figcaption>
      <canvas id="splineSlopeYCanvas"></canvas>
    </figure>
  </div>

  <pre id="status">Choose a heightmap image to begin. Try blurry continent.png from this folder.</pre>

  <script>
    const controls = document.getElementById("controls");
    const levelsInput = document.getElementById("levelsInput");
    const levelsOutput = document.getElementById("levelsOutput");
    const sourceLevelsInput = document.getElementById("sourceLevelsInput");
    const skipLowestInput = document.getElementById("skipLowestInput");
    const denseAnchorsInput = document.getElementById("denseAnchorsInput");
    const fileInput = document.getElementById("fileInput");
    const sourceCanvas = document.getElementById("sourceCanvas");
    const quantizedCanvas = document.getElementById("quantizedCanvas");
    const skeletonCanvas = document.getElementById("skeletonCanvas");
    const overlayCanvas = document.getElementById("overlayCanvas");
    const splineCanvas = document.getElementById("splineCanvas");
    const splineHeightCanvas = document.getElementById("splineHeightCanvas");
    const splineSlopeXCanvas = document.getElementById("splineSlopeXCanvas");
    const splineSlopeYCanvas = document.getElementById("splineSlopeYCanvas");
    const status = document.getElementById("status");

    const SPLINE_BASE_SPACING = 128;
    const SPLINE_LEVELS = 5;
    const ANCHOR_RELAXATION = 0.5 / 255;

    let sourceImage = null;
    let sourceName = "";

    window.addEventListener("error", (event) => {
      status.textContent = event.message;
    });

    function setCanvasSize(canvas, width, height) {
      canvas.width = width;
      canvas.height = height;
    }

    function drawImageToCanvas(image, canvas) {
      setCanvasSize(canvas, image.naturalWidth, image.naturalHeight);
      const context = canvas.getContext("2d", { willReadFrequently: true });
      context.drawImage(image, 0, 0);
      return context.getImageData(0, 0, canvas.width, canvas.height);
    }

    function imageDataToGrayscale(imageData) {
      const { data, width, height } = imageData;
      const gray = new Uint8Array(width * height);
      for (let i = 0, j = 0; i < gray.length; i++, j += 4) {
        gray[i] = Math.round(data[j] * 0.2126 + data[j + 1] * 0.7152 + data[j + 2] * 0.0722);
      }
      return gray;
    }

    function quantizeGrayscale(gray, levelCount) {
      const maxLevel = levelCount - 1;
      const quantized = new Uint8Array(gray.length);
      for (let i = 0; i < gray.length; i++) {
        quantized[i] = Math.round(gray[i] * maxLevel / 255);
      }
      return quantized;
    }

    function paintGrayscale(canvas, gray, width, height) {
      setCanvasSize(canvas, width, height);
      const pixels = new Uint8ClampedArray(width * height * 4);
      for (let i = 0, j = 0; i < gray.length; i++, j += 4) {
        pixels[j] = gray[i];
        pixels[j + 1] = gray[i];
        pixels[j + 2] = gray[i];
        pixels[j + 3] = 255;
      }
      canvas.getContext("2d").putImageData(new ImageData(pixels, width, height), 0, 0);
    }

    function paintQuantized(canvas, quantized, levelCount, width, height) {
      const maxLevel = levelCount - 1;
      const gray = new Uint8Array(quantized.length);
      for (let i = 0; i < quantized.length; i++) {
        gray[i] = Math.round(quantized[i] * 255 / maxLevel);
      }
      paintGrayscale(canvas, gray, width, height);
    }

    function paintSkeleton(canvas, skeleton, width, height) {
      setCanvasSize(canvas, width, height);
      const pixels = new Uint8ClampedArray(width * height * 4);
      for (let i = 0, j = 0; i < skeleton.length; i++, j += 4) {
        const value = skeleton[i] ? 255 : 0;
        pixels[j] = value;
        pixels[j + 1] = value;
        pixels[j + 2] = value;
        pixels[j + 3] = 255;
      }
      canvas.getContext("2d").putImageData(new ImageData(pixels, width, height), 0, 0);
    }

    function paintOverlay(canvas, gray, skeleton, width, height) {
      setCanvasSize(canvas, width, height);
      const pixels = new Uint8ClampedArray(width * height * 4);
      for (let i = 0, j = 0; i < gray.length; i++, j += 4) {
        const base = Math.round(gray[i] * 0.65);
        if (skeleton[i]) {
          pixels[j] = 255;
          pixels[j + 1] = 32;
          pixels[j + 2] = 32;
        } else {
          pixels[j] = base;
          pixels[j + 1] = base;
          pixels[j + 2] = base;
        }
        pixels[j + 3] = 255;
      }
      canvas.getContext("2d").putImageData(new ImageData(pixels, width, height), 0, 0);
    }

    function buildLevelMask(quantized, level) {
      const mask = new Uint8Array(quantized.length);
      for (let i = 0; i < quantized.length; i++) {
        mask[i] = quantized[i] === level ? 1 : 0;
      }
      return mask;
    }

    function countOnes(values) {
      let count = 0;
      for (let i = 0; i < values.length; i++) {
        count += values[i];
      }
      return count;
    }

    function writeCubicBasis(t, out) {
      const t2 = t * t;
      const t3 = t2 * t;
      out[0] = (1 - 3 * t + 3 * t2 - t3) / 6;
      out[1] = (4 - 6 * t2 + 3 * t3) / 6;
      out[2] = (1 + 3 * t + 3 * t2 - 3 * t3) / 6;
      out[3] = t3 / 6;
    }

    function writeCubicBasisDerivative(t, out) {
      const t2 = t * t;
      out[0] = (-3 + 6 * t - 3 * t2) / 6;
      out[1] = (-12 * t + 9 * t2) / 6;
      out[2] = (3 + 6 * t - 9 * t2) / 6;
      out[3] = 3 * t2 / 6;
    }

    function collectSkeletonPoints(skeleton, gray, width) {
      const count = countOnes(skeleton);
      const x = new Uint32Array(count);
      const y = new Uint32Array(count);
      const z = new Float64Array(count);
      const predicted = new Float64Array(count);
      let point = 0;

      for (let i = 0; i < skeleton.length; i++) {
        if (skeleton[i]) {
          x[point] = i % width;
          y[point] = Math.floor(i / width);
          z[point] = gray[i] / 255;
          point++;
        }
      }

      return { count, x, y, z, predicted };
    }

    function collectDenseImagePoints(gray, width) {
      const count = gray.length;
      const x = new Uint32Array(count);
      const y = new Uint32Array(count);
      const z = new Float64Array(count);
      const predicted = new Float64Array(count);

      for (let i = 0; i < gray.length; i++) {
        x[i] = i % width;
        y[i] = Math.floor(i / width);
        z[i] = gray[i] / 255;
      }

      return { count, x, y, z, predicted };
    }

    function evaluateSplineLevelAtPoint(level, x, y, bx, by) {
      const tx = x / level.spacing;
      const ty = y / level.spacing;
      const ix = Math.floor(tx);
      const iy = Math.floor(ty);
      writeCubicBasis(tx - ix, bx);
      writeCubicBasis(ty - iy, by);

      let value = 0;
      for (let j = 0; j < 4; j++) {
        const row = (iy + j) * level.cols + ix;
        const wy = by[j];
        for (let i = 0; i < 4; i++) {
          value += level.controls[row + i] * bx[i] * wy;
        }
      }
      return value;
    }

    function relaxedAnchorResidual(target, predicted) {
      const residual = target - predicted;
      if (residual > ANCHOR_RELAXATION) {
        return residual - ANCHOR_RELAXATION;
      }
      if (residual < -ANCHOR_RELAXATION) {
        return residual + ANCHOR_RELAXATION;
      }
      return 0;
    }

    function fitSplineLevel(points, width, height, spacing) {
      const cols = Math.floor((width - 1) / spacing) + 4;
      const rows = Math.floor((height - 1) / spacing) + 4;
      const numerator = new Float64Array(cols * rows);
      const denominator = new Float64Array(cols * rows);
      const bx = new Float64Array(4);
      const by = new Float64Array(4);

      for (let point = 0; point < points.count; point++) {
        const residual = relaxedAnchorResidual(points.z[point], points.predicted[point]);
        if (residual === 0) {
          continue;
        }
        const tx = points.x[point] / spacing;
        const ty = points.y[point] / spacing;
        const ix = Math.floor(tx);
        const iy = Math.floor(ty);
        writeCubicBasis(tx - ix, bx);
        writeCubicBasis(ty - iy, by);

        let localWeightSum = 0;
        for (let j = 0; j < 4; j++) {
          for (let i = 0; i < 4; i++) {
            const weight = bx[i] * by[j];
            localWeightSum += weight * weight;
          }
        }
        if (localWeightSum <= 0) {
          continue;
        }

        for (let j = 0; j < 4; j++) {
          const row = (iy + j) * cols + ix;
          for (let i = 0; i < 4; i++) {
            const weight = bx[i] * by[j];
            const nodeWeight = weight * weight;
            const index = row + i;
            numerator[index] += nodeWeight * weight * residual / localWeightSum;
            denominator[index] += nodeWeight;
          }
        }
      }

      const controls = new Float64Array(cols * rows);
      for (let i = 0; i < controls.length; i++) {
        controls[i] = denominator[i] > 0 ? numerator[i] / denominator[i] : 0;
      }
      return { spacing, cols, rows, controls };
    }

    async function fitMultilevelBSpline(points, width, height) {
      const levels = [];
      const started = performance.now();

      for (let levelIndex = 0; levelIndex < SPLINE_LEVELS; levelIndex++) {
        const spacing = Math.max(4, Math.round(SPLINE_BASE_SPACING / (2 ** levelIndex)));
        status.textContent = `Fitting B-spline level ${levelIndex + 1} of ${SPLINE_LEVELS} (spacing ${spacing}px)...`;
        await nextFrame();

        const level = fitSplineLevel(points, width, height, spacing);
        levels.push(level);

        const bx = new Float64Array(4);
        const by = new Float64Array(4);
        for (let point = 0; point < points.count; point++) {
          points.predicted[point] += evaluateSplineLevelAtPoint(level, points.x[point], points.y[point], bx, by);
        }
      }

      let squaredError = 0;
      let squaredIntervalError = 0;
      for (let point = 0; point < points.count; point++) {
        const error = points.z[point] - points.predicted[point];
        squaredError += error * error;
        const intervalError = relaxedAnchorResidual(points.z[point], points.predicted[point]);
        squaredIntervalError += intervalError * intervalError;
      }

      return {
        levels,
        fitMs: performance.now() - started,
        rmse: points.count > 0 ? Math.sqrt(squaredError / points.count) : 0,
        intervalRmse: points.count > 0 ? Math.sqrt(squaredIntervalError / points.count) : 0,
      };
    }

    function precomputeSplineAxis(size, spacing) {
      const base = new Int32Array(size);
      const weights = new Float32Array(size * 4);
      const derivatives = new Float32Array(size * 4);
      const basis = new Float64Array(4);
      const derivative = new Float64Array(4);
      for (let x = 0; x < size; x++) {
        const t = x / spacing;
        const i = Math.floor(t);
        base[x] = i;
        writeCubicBasis(t - i, basis);
        writeCubicBasisDerivative(t - i, derivative);
        for (let j = 0; j < 4; j++) {
          weights[x * 4 + j] = basis[j];
          derivatives[x * 4 + j] = derivative[j] / spacing;
        }
      }
      return { base, weights, derivatives };
    }

    async function evaluateBSplineHeightAndSlope(levels, width, height) {
      const values = new Float32Array(width * height);
      const slopeX = new Float32Array(width * height);
      const slopeY = new Float32Array(width * height);
      const axisCache = levels.map(level => ({
        x: precomputeSplineAxis(width, level.spacing),
        y: precomputeSplineAxis(height, level.spacing),
      }));

      for (let levelIndex = 0; levelIndex < levels.length; levelIndex++) {
        const level = levels[levelIndex];
        const axes = axisCache[levelIndex];
        status.textContent = `Rendering B-spline level ${levelIndex + 1} of ${levels.length}...`;
        await nextFrame();

        for (let y = 0; y < height; y++) {
          const yBase = axes.y.base[y];
          const yWeightIndex = y * 4;
          const outRow = y * width;
          for (let x = 0; x < width; x++) {
            const xBase = axes.x.base[x];
            const xWeightIndex = x * 4;
            let value = 0;
            let dx = 0;
            let dy = 0;

            for (let j = 0; j < 4; j++) {
              const controlRow = (yBase + j) * level.cols + xBase;
              const wy = axes.y.weights[yWeightIndex + j];
              const dwy = axes.y.derivatives[yWeightIndex + j];
              for (let i = 0; i < 4; i++) {
                const control = level.controls[controlRow + i];
                const wx = axes.x.weights[xWeightIndex + i];
                const dwx = axes.x.derivatives[xWeightIndex + i];
                value += control * wx * wy;
                dx += control * dwx * wy;
                dy += control * wx * dwy;
              }
            }

            values[outRow + x] += value;
            slopeX[outRow + x] += dx;
            slopeY[outRow + x] += dy;
          }
        }
      }

      const xScale = width - 1;
      const yScale = height - 1;
      for (let i = 0; i < values.length; i++) {
        slopeX[i] *= xScale;
        slopeY[i] *= yScale;
      }

      return { height: values, slopeX, slopeY };
    }

    function findMaxAbs(values) {
      let maxAbs = 0;
      for (let i = 0; i < values.length; i++) {
        maxAbs = Math.max(maxAbs, Math.abs(values[i]));
      }
      return maxAbs;
    }

    function paintFloatChannel(canvas, values, width, height, center, scale) {
      setCanvasSize(canvas, width, height);
      const pixels = new Uint8ClampedArray(width * height * 4);
      for (let i = 0, j = 0; i < values.length; i++, j += 4) {
        const normalized = Math.min(Math.max((values[i] - center) / scale, 0), 1);
        const value = Math.round(normalized * 255);
        pixels[j] = value;
        pixels[j + 1] = value;
        pixels[j + 2] = value;
        pixels[j + 3] = 255;
      }
      canvas.getContext("2d").putImageData(new ImageData(pixels, width, height), 0, 0);
    }

    function paintHeightAndSlope(canvas, surface, width, height, slopeScale) {
      setCanvasSize(canvas, width, height);
      const pixels = new Uint8ClampedArray(width * height * 4);
      for (let i = 0, j = 0; i < surface.height.length; i++, j += 4) {
        pixels[j] = Math.round(Math.min(Math.max(surface.height[i], 0), 1) * 255);
        pixels[j + 1] = Math.round(Math.min(Math.max(surface.slopeX[i] / slopeScale * 0.5 + 0.5, 0), 1) * 255);
        pixels[j + 2] = Math.round(Math.min(Math.max(surface.slopeY[i] / slopeScale * 0.5 + 0.5, 0), 1) * 255);
        pixels[j + 3] = 255;
      }
      canvas.getContext("2d").putImageData(new ImageData(pixels, width, height), 0, 0);
    }

    // Zhang-Suen thinning. The source Python script skeletonizes each 8-connected
    // terrace component; this local thinning rule is also 8-neighbor based, so
    // disconnected components in the same terrace can be processed in one mask.
    function skeletonizeMask(mask, width, height) {
      const pixels = mask;
      const deleteList = new Int32Array(width * height);
      let changed = true;
      let iterationCount = 0;

      while (changed) {
        changed = false;

        for (let pass = 0; pass < 2; pass++) {
          let deleteCount = 0;

          for (let y = 1; y < height - 1; y++) {
            const row = y * width;
            for (let x = 1; x < width - 1; x++) {
              const index = row + x;
              if (!pixels[index]) {
                continue;
              }

              const p2 = pixels[index - width];
              const p3 = pixels[index - width + 1];
              const p4 = pixels[index + 1];
              const p5 = pixels[index + width + 1];
              const p6 = pixels[index + width];
              const p7 = pixels[index + width - 1];
              const p8 = pixels[index - 1];
              const p9 = pixels[index - width - 1];

              const neighborCount = p2 + p3 + p4 + p5 + p6 + p7 + p8 + p9;
              if (neighborCount < 2 || neighborCount > 6) {
                continue;
              }

              const transitionCount =
                (!p2 && p3) + (!p3 && p4) + (!p4 && p5) + (!p5 && p6) +
                (!p6 && p7) + (!p7 && p8) + (!p8 && p9) + (!p9 && p2);
              if (transitionCount !== 1) {
                continue;
              }

              if (pass === 0) {
                if (p2 && p4 && p6) {
                  continue;
                }
                if (p4 && p6 && p8) {
                  continue;
                }
              } else {
                if (p2 && p4 && p8) {
                  continue;
                }
                if (p2 && p6 && p8) {
                  continue;
                }
              }

              deleteList[deleteCount++] = index;
            }
          }

          if (deleteCount > 0) {
            changed = true;
            for (let i = 0; i < deleteCount; i++) {
              pixels[deleteList[i]] = 0;
            }
          }
        }

        iterationCount++;
      }

      return iterationCount;
    }

    function nextFrame() {
      return new Promise(resolve => requestAnimationFrame(resolve));
    }

    function getLevelCount() {
      return sourceLevelsInput.checked ? 256 : Number(levelsInput.value);
    }

    function updateLevelControls() {
      const useSourceLevels = sourceLevelsInput.checked;
      levelsInput.disabled = useSourceLevels;
      levelsOutput.textContent = String(getLevelCount());
    }

    async function runSkeletonize() {
      if (!sourceImage) {
        return;
      }

      const useSourceLevels = sourceLevelsInput.checked;
      const levelCount = getLevelCount();
      const skipLowest = skipLowestInput.checked;
      const useDenseAnchors = denseAnchorsInput.checked;
      updateLevelControls();

      const started = performance.now();
      status.textContent = `Reading ${sourceName}...`;

      let imageData;
      try {
        imageData = drawImageToCanvas(sourceImage, sourceCanvas);
      } catch (error) {
        status.textContent =
          `Could not read pixels from ${sourceName}.\n` +
          `If the browser blocks file:// canvas access, use the file picker above or open this folder through a local server.\n\n` +
          String(error);
        return;
      }

      const { width, height } = imageData;
      const gray = imageDataToGrayscale(imageData);
      const quantized = useSourceLevels ? gray : quantizeGrayscale(gray, levelCount);
      const levelCounts = new Uint32Array(levelCount);
      for (let i = 0; i < quantized.length; i++) {
        levelCounts[quantized[i]]++;
      }
      const skeleton = new Uint8Array(width * height);
      const firstLevel = skipLowest ? 1 : 0;
      let selectedCount = 0;
      let processedLevels = 0;
      let thinningIterations = 0;

      paintQuantized(quantizedCanvas, quantized, levelCount, width, height);

      for (let level = firstLevel; level < levelCount; level++) {
        if (levelCounts[level] === 0) {
          continue;
        }
        processedLevels++;
        status.textContent = `Skeletonizing terrace ${level + 1} of ${levelCount}...`;
        await nextFrame();

        const mask = buildLevelMask(quantized, level);
        thinningIterations += skeletonizeMask(mask, width, height);

        for (let i = 0; i < mask.length; i++) {
          if (mask[i]) {
            skeleton[i] = 1;
            selectedCount++;
          }
        }
      }

      paintSkeleton(skeletonCanvas, skeleton, width, height);
      paintOverlay(overlayCanvas, gray, skeleton, width, height);

      const skeletonMs = performance.now() - started;
      const skeletonPoints = collectSkeletonPoints(skeleton, gray, width);
      const densePoints = useDenseAnchors ? collectDenseImagePoints(gray, width) : null;
      const points = densePoints || skeletonPoints;
      const anchorDescription = useDenseAnchors
        ? `${points.count} dense source pixels (${skeletonPoints.count} skeleton pixels ignored for fit)`
        : `${points.count} skeleton pixels`;
      let splineFitMs = 0;
      let splineRenderMs = 0;
      let splineRmse = 0;
      let splineIntervalRmse = 0;
      let slopeScale = 1;

      if (points.count > 0) {
        const fit = await fitMultilevelBSpline(points, width, height);
        splineFitMs = fit.fitMs;
        splineRmse = fit.rmse;
        splineIntervalRmse = fit.intervalRmse;

        const renderStarted = performance.now();
        const splineSurface = await evaluateBSplineHeightAndSlope(fit.levels, width, height);
        splineRenderMs = performance.now() - renderStarted;

        slopeScale = Math.max(findMaxAbs(splineSurface.slopeX), findMaxAbs(splineSurface.slopeY), 1e-6);
        paintHeightAndSlope(splineCanvas, splineSurface, width, height, slopeScale);
        paintFloatChannel(splineHeightCanvas, splineSurface.height, width, height, 0, 1);
        paintFloatChannel(splineSlopeXCanvas, splineSurface.slopeX, width, height, -slopeScale, 2 * slopeScale);
        paintFloatChannel(splineSlopeYCanvas, splineSurface.slopeY, width, height, -slopeScale, 2 * slopeScale);
      }

      const elapsedMs = performance.now() - started;
      status.textContent =
        `Image: ${sourceName}\n` +
        `Size: ${width} x ${height}\n` +
        `Quantized levels: ${levelCount}\n` +
        `Pre-quantization: ${useSourceLevels ? "off (using 256 source levels)" : "on"}\n` +
        `Skipped lowest terrace: ${skipLowest ? "yes" : "no"}\n` +
        `Terraces processed: ${processedLevels}\n` +
        `Selected skeleton pixels: ${selectedCount} of ${width * height} (${(selectedCount / (width * height) * 100).toFixed(2)}%)\n` +
        `Spline anchors: ${anchorDescription}\n` +
        `Total thinning iterations across terraces: ${thinningIterations}\n` +
        `B-spline levels: ${SPLINE_LEVELS}, base spacing: ${SPLINE_BASE_SPACING}px\n` +
        `B-spline anchor relaxation: +/-${ANCHOR_RELAXATION.toFixed(4)} height units\n` +
        `B-spline raw RMSE on skeleton points: ${splineRmse.toFixed(4)}\n` +
        `B-spline interval violation RMSE: ${splineIntervalRmse.toFixed(4)}\n` +
        `B-spline slope display scale: +/-${slopeScale.toFixed(4)} height units per image unit\n` +
        `Skeletonize elapsed: ${(skeletonMs / 1000).toFixed(2)} seconds\n` +
        `B-spline fit elapsed: ${(splineFitMs / 1000).toFixed(2)} seconds\n` +
        `B-spline render elapsed: ${(splineRenderMs / 1000).toFixed(2)} seconds\n` +
        `Elapsed: ${(elapsedMs / 1000).toFixed(2)} seconds`;
    }

    function loadImageFromUrl(url, name) {
      const image = new Image();
      image.onload = () => {
        sourceImage = image;
        sourceName = name;
        runSkeletonize();
      };
      image.onerror = () => {
        status.textContent =
          `Could not load ${name} automatically.\n` +
          `The file in this folder is named "blurry continent.png"; if local file loading is blocked, use the file picker above.`;
      };
      image.src = url;
    }

    controls.addEventListener("submit", (event) => {
      event.preventDefault();
      runSkeletonize();
    });

    levelsInput.addEventListener("input", () => {
      updateLevelControls();
    });

    sourceLevelsInput.addEventListener("change", () => {
      updateLevelControls();
    });

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) {
        return;
      }
      const url = URL.createObjectURL(file);
      loadImageFromUrl(url, file.name);
    });

    updateLevelControls();
  </script>
</body>
</html>
